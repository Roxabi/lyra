<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --obsidian: #0a0a0f;
  --forge: #e85d04;
  --ember: #f97316;
  --spark: #fafafa;
  --steel-gray: #6b7280;
}
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: var(--obsidian);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 32px;
}

.logo-wrap {
  width: 240px; height: 240px;
  filter: drop-shadow(0 0 24px rgba(232,93,4,0.45)) drop-shadow(0 0 64px rgba(232,93,4,0.18));
}
.logo-wrap svg { width: 100%; height: 100%; }

.wordmark {
  font-family: 'Outfit', sans-serif;
  font-weight: 800; font-size: 28px;
  letter-spacing: 0.22em; color: var(--spark);
  text-shadow: 0 0 18px rgba(232,93,4,0.4), 0 0 40px rgba(232,93,4,0.15);
  opacity: 0; transform: translateY(6px);
  animation: wordIn 0.6s cubic-bezier(0.22,1,0.36,1) 5.8s forwards;
}

.tagline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 500;
  letter-spacing: 0.08em; color: var(--steel-gray);
  opacity: 0; transform: translateY(4px);
  animation: wordIn 0.5s cubic-bezier(0.22,1,0.36,1) 6.2s forwards;
}

.submark {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 500;
  letter-spacing: 0.16em; color: var(--steel-gray);
  opacity: 0.4; position: fixed; bottom: 16px;
}

@keyframes wordIn {
  to { opacity: 1; transform: translateY(0); }
}

.replay-btn {
  position: fixed; top: 16px; right: 16px;
  background: #1f2937; border: 1px solid #2a2a35;
  color: #6b7280; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 0.1em;
  padding: 7px 12px; cursor: pointer; border-radius: 4px;
  transition: color 0.2s, border-color 0.2s;
}
.replay-btn:hover { color: #fafafa; border-color: #e85d04; }

@media (prefers-reduced-motion: reduce) {
  .wordmark, .tagline { opacity: 1; transform: none; animation: none; }
}
</style>
</head>
<body>

<div class="logo-wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-hidden="true" overflow="visible">
  <style>
    @keyframes pF1 {
      0%   { transform: translate(0,0); opacity: 0; }
      12%  { opacity: 0.75; }
      88%  { opacity: 0.2; }
      100% { transform: translate(10px,-34px); opacity: 0; }
    }
    @keyframes pF2 {
      0%   { transform: translate(0,0); opacity: 0; }
      18%  { opacity: 0.6; }
      82%  { opacity: 0.15; }
      100% { transform: translate(-12px,-30px); opacity: 0; }
    }
    @keyframes pF3 {
      0%   { transform: translate(0,0); opacity: 0; }
      10%  { opacity: 0.55; }
      90%  { opacity: 0.12; }
      100% { transform: translate(6px,-38px); opacity: 0; }
    }
  </style>

  <defs>
    <!-- Diamond fill (brightened) -->
    <linearGradient id="hm-dF" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4a2c12"/>
      <stop offset="40%" stop-color="#2e1a0a"/>
      <stop offset="100%" stop-color="#1a1520"/>
    </linearGradient>

    <!-- Top facet -->
    <linearGradient id="hm-tF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafafa" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#e85d04" stop-opacity="0.10"/>
    </linearGradient>

    <!-- Left facet -->
    <linearGradient id="hm-lF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e85d04" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </linearGradient>

    <!-- Right facet -->
    <linearGradient id="hm-rF" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </linearGradient>

    <!-- Core glow -->
    <radialGradient id="hm-cG" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.90"/>
      <stop offset="40%" stop-color="#e85d04" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#e85d04" stop-opacity="0"/>
    </radialGradient>

    <!-- Hub radial -->
    <radialGradient id="hm-hR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="35%" stop-color="#f97316" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e85d04" stop-opacity="0"/>
    </radialGradient>

    <!-- Spoke gradient -->
    <linearGradient id="hm-sG" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e85d04" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fafafa" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Anvil fill -->
    <linearGradient id="hm-aF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a35"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>

    <!-- Glow + shadow filter -->
    <filter id="hm-gS" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Anvil shadow -->
    <filter id="hm-aS" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#e85d04" flood-opacity="0.15"/>
    </filter>

    <!-- Diamond clip -->
    <clipPath id="hm-dC">
      <polygon points="120,14 182,82 156,142 120,158 84,142 58,82"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════════════════════════════════
       PHASE 1: Converging Sparks (0-1.5s)
       ═══════════════════════════════════════════════════════════ -->
  <g>
    <circle r="2.2" fill="#f97316" opacity="0">

    </circle>
    <circle r="1.2" fill="#e85d04" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0" dur="0.6s" begin="0.4s" fill="freeze"/>
      <animateMotion path="M 120,0 C 120,30 120,65 120,98" dur="0.6s" begin="0.4s" fill="freeze"/>
    </circle>
    <circle r="1.2" fill="#fafafa" opacity="0">

      <animateMotion path="M 55,45 C 80,65 100,82 118,100" dur="0.7s" begin="0.7s" fill="freeze"/>
    </circle>
    <circle r="1.2" fill="#fafafa" opacity="0">
      <animate attributeName="opacity" values="0;0.4;0" dur="0.7s" begin="0.75s" fill="freeze"/>
      <animateMotion path="M 185,45 C 160,65 140,82 122,100" dur="0.7s" begin="0.75s" fill="freeze"/>
    </circle>
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       PHASE 2: Diamond Materialization (1.4-2.5s)
       ═══════════════════════════════════════════════════════════ -->
  <g style="transform-origin: 120px 100px;">
    <!-- Base fill -->
    <polygon points="120,14 182,82 156,142 120,158 84,142 58,82"
      fill="url(#hm-dF)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.25s" begin="1.4s" fill="freeze"/>
    </polygon>

    <!-- Facets -->
    <polygon points="120,14 58,82 182,82"
      fill="url(#hm-tF)" stroke="#fafafa" stroke-width="0.8" stroke-opacity="0.35" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.5s" fill="freeze"/>
    </polygon>
    <polygon points="120,14 58,82 84,142 120,100"
      fill="url(#hm-lF)" stroke="#e85d04" stroke-width="0.7" stroke-opacity="0.5" opacity="0">

    </polygon>
    <polygon points="120,14 182,82 156,142 120,100"

    </polygon>
    <polygon points="58,82 84,142 120,158 120,100"

    <!-- Edge traces -->
    <line x1="120" y1="14" x2="58" y2="82" stroke="#e85d04" stroke-width="1.5" stroke-linecap="round"

    <line x1="120" y1="14" x2="182" y2="82" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"

      <animate attributeName="stroke-dashoffset" from="144" to="0" dur="0.5s" begin="1.6s" fill="freeze"/>
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="1.6s" fill="freeze"/>
    </line>

    <!-- ═══════════════════════════════════════════════════════════
         PHASE 3: Core Glow + Hub (2.2-3.5s)
         ═══════════════════════════════════════════════════════════ -->

    <!-- Core glow (circle, clipped to diamond) -->
    <circle cx="120" cy="95" r="0" fill="url(#hm-cG)" opacity="0" clip-path="url(#hm-dC)">
      <animate attributeName="r" from="0" to="51" dur="0.6s" begin="2.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="2.2s" fill="freeze"/>
    </circle>

    <!-- Constellation flash group -->
    <g opacity="0">
      <animate attributeName="opacity"

        keyTimes="0;0.03;0.12;0.4;0.6;0.85;1"

      <circle cx="120" cy="95" r="5" fill="url(#hm-hR)" filter="url(#hm-gS)"/>

      <line x1="120" y1="95" x2="120" y2="28"  stroke="url(#hm-sG)" stroke-width="1.0" stroke-linecap="round"/>
      <line x1="120" y1="95" x2="73"  y2="82"  stroke="url(#hm-sG)" stroke-width="1.0" stroke-linecap="round"/>

      <!-- Dashed circuit traces -->

        stroke="#e85d04" stroke-width="0.7" stroke-opacity="0.6" stroke-dasharray="3 3"/>
      <line x1="132" y1="67" x2="152" y2="67"
        stroke="#fafafa" stroke-width="0.7" stroke-opacity="0.45" stroke-dasharray="3 3"/>

        stroke="#e85d04" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.6"/>
      <polyline points="124,72 130,67 136,72"
        stroke="#fafafa" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.45"/>

      <!-- Extra trace details -->
      <line x1="96" y1="110" x2="104" y2="117"
        stroke="#e85d04" stroke-width="0.6" stroke-opacity="0.4" stroke-dasharray="2 2"/>
      <line x1="136" y1="117" x2="144" y2="110"
        stroke="#fafafa" stroke-width="0.6" stroke-opacity="0.35" stroke-dasharray="2 2"/>

    <!-- Hub rings -->
    <circle cx="120" cy="95" r="6" fill="none" stroke="#e85d04" stroke-width="1.5" opacity="0">

  <!-- ═══════════════════════════════════════════════════════════
       PHASE 4: Anvil Entrance — Industrial Circuit (4.3-4.8s)
       ═══════════════════════════════════════════════════════════ -->
  <g opacity="0" filter="url(#hm-aS)">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.3s" fill="freeze"/>

    <!-- Connection glow -->
    <circle cx="120" cy="162" r="12" fill="#e85d04" opacity="0.1"/>
    <circle cx="120" cy="160" r="3" fill="#e85d04" opacity="0.7" filter="url(#hm-gS)"/>

    <!-- Platform -->
    <rect x="66" y="166" width="108" height="16" rx="2" fill="url(#hm-aF)" stroke="#3a3a45" stroke-width="1"/>
    <line x1="68" y1="166" x2="172" y2="166" stroke="#e85d04" stroke-width="0.7" opacity="0.3"/>

    <!-- Bolts (6 — extra mid bolts) -->
    <circle cx="74"  cy="172" r="3" fill="#1a1a25" stroke="#3a3a45" stroke-width="0.5"/>

    <circle cx="120" cy="168" r="2.5" fill="#1a1a25" stroke="#3a3a45" stroke-width="0.5"/>
    <circle cx="120" cy="168" r="0.8" fill="#333"/>
    <circle cx="166" cy="172" r="3" fill="#1a1a25" stroke="#3a3a45" stroke-width="0.5"/>
