# .claude/stack.yml — dev-core stack configuration
schema_version: "1.0"

runtime: python
package_manager: uv

backend:
  framework: typer
  path: src/lyra

build:
  formatter: ruff
  formatter_config: pyproject.toml
  formatter_fix_cmd: "uv run ruff format . && uv run ruff check --fix ."

testing:
  unit: pytest

lsp:
  enabled: true
  server: pyright

deploy:
  platform: none

docs:
  framework: none
  path: docs
  format: md

commands:
  dev: uv run lyra
  test: uv run pytest
  lint: uv run ruff check .
  format: uv run ruff format .
  typecheck: uv run pyright
  install: uv sync

artifacts:
  analyses: artifacts/analyses
  specs: artifacts/specs
  frames: artifacts/frames
  plans: artifacts/plans

quality_gates:
  file_length:
    enabled: true
    max_lines: 300
    globs: ["src/**/*.py"]
    exemptions_file: tools/file_exemptions.txt

  folder_size:
    enabled: true
    max_files: 12
    globs: ["src/**"]
    exemptions_file: tools/folder_exemptions.txt

  import_layers:
    enabled: true
    stage: pre-push
    config: .importlinter
