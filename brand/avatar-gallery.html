// ── Discovery ─────────────────────────────────────────────────────────────────
async function discoverBatch(batch) {
  try {
    const res = await fetch(API_PATHS[batch]);
    if (!res.ok) return [];
    const listing = await res.json();
    const catalogue = batch === 'v1' ? CATALOGUE : CATALOGUE_V2;
    return listing
      .filter(f => f.name.endsWith('.png'))
      .map(f => f.name.replace('.png', ''))
      .sort()
      .map(stem => {
        const meta = catalogue[stem] || { label: stem, tags: [] };
        return { stem, file: stem + '.png', label: meta.label, tags: meta.tags,
                 lighting: lightingOf(stem), batch, imgBase: BASES[batch] };
      });
  } catch (_) { return []; }
}

async function discover() {
  const [v1, v2] = await Promise.all([discoverBatch('v1'), discoverBatch('v2')]);
  const all = [...v1, ...v2];
  return all.length ? all : null;
}

      ? '<span style="position:absolute;top:8px;right:8px;z-index:2;font-size:9px;font-family:JetBrains Mono,monospace;background:rgba(232,93,4,0.2);color:#e85d04;border:1px solid rgba(232,93,4,0.3);padding:1px 5px;border-radius:3px;">V2</span>'
      : '';

    div.innerHTML = `
      <span class="badge-light ${badgeClass}">${item.lighting.toUpperCase()}</span>
      ${batchBadge}
      <img src="${item.imgBase}${item.file}" alt="${item.label}">
      <div class="info">
        <div class="num">${num}</div>
        <div class="label">${item.label}</div>
        <div class="tags">${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <button class="star-btn" onclick="toggleStar(event,'${item.stem}',this.closest('.card'))">★</button>
    `;
    div.querySelector('img').onclick   = () => openLb(i);
    div.querySelector('.info').onclick = () => openLb(i);
    grid.appendChild(div);
  });

  applyFilter();
}

// ── Filter ────────────────────────────────────────────────────────────────────
function setFilter(btn, f) {
  currentFilter = f;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  visibleItems = [];
  document.querySelectorAll('.card').forEach((card, i) => {
    const tags      = card.dataset.tags || '';
    const batch     = card.dataset.batch || 'v1';
    const isStarred = card.classList.contains('starred');
    const matchBatch = currentBatch === 'all' || batch === currentBatch;
    const matchFilter =
      currentFilter === 'all'     ? true :
      currentFilter === 'starred' ? isStarred :
      tags.includes(currentFilter);
    const show = matchBatch && matchFilter;
    card.classList.toggle('hidden', !show);
    if (show) visibleItems.push(i);
  });
  document.getElementById('visCount').textContent = visibleItems.length;
}

// ── Star ──────────────────────────────────────────────────────────────────────
function toggleStar(e, stem, card) {
  e.stopPropagation();
  if (starred.has(stem)) { starred.delete(stem); card.classList.remove('starred'); }
  else                   { starred.add(stem);    card.classList.add('starred'); }
  localStorage.setItem('lyra-avatar-starred', JSON.stringify([...starred]));
  document.getElementById('starCount').textContent = starred.size;
  if (currentFilter === 'starred') applyFilter();
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function openLb(idx) { lbIndex = idx; renderLb(); document.getElementById('lb').classList.add('open'); }

function renderLb() {
  const item = allItems[lbIndex];
  document.getElementById('lbImg').src       = item.imgBase + item.file;
  document.getElementById('lbImg').alt       = item.label;
  document.getElementById('lbTitle').textContent = item.stem.split('-')[0] + ' — ' + item.label;
  document.getElementById('lbTags').innerHTML    = item.tags.map(t => `<span class="tag">${t}</span>`).join('');
  document.getElementById('lbCaption').textContent = item.file;
}

function lbNav(dir, e) {
  if (e) e.stopPropagation();
  lbIndex = (lbIndex + dir + allItems.length) % allItems.length;
  renderLb();
}

function closeLb(e) {
  if (!e || e.target === document.getElementById('lb') || e.target.classList.contains('lb-close')) {
    document.getElementById('lb').classList.remove('open');
  }
}

document.addEventListener('keydown', e => {
  const lb = document.getElementById('lb');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  lbNav(-1);
  else if (e.key === 'ArrowRight') lbNav(1);
  else if (e.key === 'Escape') closeLb({ target: lb });
});

// ── Empty state ───────────────────────────────────────────────────────────────
function showEmpty(reason) {
  document.getElementById('grid').innerHTML = `
    <div style="grid-column:1/-1;text-align:center;padding:80px 24px;max-width:560px;margin:0 auto;">
      <div style="font-size:32px;margin-bottom:16px;opacity:.3">⚡</div>
      <h2 style="font-size:15px;color:#555;font-weight:500;margin-bottom:20px;">${reason}</h2>
      <pre style="background:#0d0d10;border:1px solid #1a1a1f;border-radius:8px;padding:16px 20px;text-align:left;font-size:11px;color:#e85d04;font-family:'JetBrains Mono',monospace;overflow-x:auto;">cd ~/projects/lyra
imagecli batch brand/prompts/avatar/ \\
  --output-dir brand/concepts/avatar/</pre>
      <p style="font-size:10px;color:#333;font-family:'JetBrains Mono',monospace;margin-top:12px;">
        then refresh · served via localhost:8080
      </p>
    </div>`;
  document.getElementById('subtitle').textContent = 'No images yet';
  document.getElementById('totalCount').textContent = '0';
  document.getElementById('visCount').textContent = '0';
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  const items = await discover();
  if (!items) {
    showEmpty('serve.py not running — start the diagram server first');
  } else if (items.length === 0) {
    showEmpty('No images generated yet — run the batch command below');
  } else {
    buildGrid(items);
  }
  document.getElementById('starCount').textContent = starred.size;
})();
</script>
</body>
