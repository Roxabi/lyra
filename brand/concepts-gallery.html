<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyra — Logo Concepts Gallery</title>
<!-- diagram-meta:start -->
<meta name="diagram:title"     content="Lyra — Logo Concepts Gallery">
<meta name="diagram:date"      content="2026-03-25">
<meta name="diagram:category"  content="lyra">
<meta name="diagram:cat-label" content="Lyra Brand">
<meta name="diagram:color"     content="amber">
<meta name="diagram:badges"    content="latest,showcase">
<!-- diagram-meta:end -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #08080a; color: #e0e0e0; font-family: 'Inter', sans-serif; padding: 48px 24px 64px; min-height: 100vh; }

header { text-align: center; margin-bottom: 24px; }
header h1 { font-size: 28px; font-weight: 600; color: #fff; margin-bottom: 8px; }
header p { font-size: 12px; color: #555; font-family: 'JetBrains Mono', monospace; }

/* ── Batch bar ── */
.batch-bar {
  display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
  margin-bottom: 16px; padding: 0 24px;
}
.batch-bar button {
  background: #111114; border: 1px solid #1a1a1f; color: #888;
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
  padding: 8px 20px; border-radius: 8px; cursor: pointer;
  transition: all 0.2s;
}
.batch-bar button:hover { border-color: #444; color: #ddd; }
.batch-bar button.active { background: #1a1a2e; color: #fff; border-color: #e85d04; }
.batch-seed {
  display: block; text-align: center;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #444;
  margin-bottom: 12px; padding: 0 24px;
}

/* ── Filter bar ── */
.filters {
  display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
  margin-bottom: 32px; padding: 0 24px;
}
.filters button {
  background: #111114; border: 1px solid #1a1a1f; color: #666;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  padding: 5px 12px; border-radius: 6px; cursor: pointer;
  transition: all 0.2s; letter-spacing: 0.04em;
}
.filters button:hover { border-color: #333; color: #ccc; }
.filters button.active { background: #e85d04; color: #000; border-color: #e85d04; }

.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 1600px; margin: 0 auto; }
@media (max-width: 1200px) { .grid { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 600px)  { .grid { grid-template-columns: repeat(2, 1fr); } }

.card {
  background: #111114; border: 1px solid #1a1a1f; border-radius: 12px;
  overflow: hidden; cursor: pointer; position: relative;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
}
.card:hover { border-color: #e85d04; transform: translateY(-3px); box-shadow: 0 8px 32px rgba(232,93,4,0.15); }
.card.hidden { display: none; }
.card.starred { border-color: #f59e0b; }
.card.starred::after {
  content: '★'; position: absolute; top: 8px; right: 8px;
  color: #f59e0b; font-size: 14px; z-index: 3;
  text-shadow: 0 0 6px rgba(245,158,11,0.6);
}
.star-btn {
  position: absolute; bottom: 8px; right: 8px; z-index: 3;
  background: transparent; border: none; cursor: pointer;
  font-size: 18px; color: #2a2a2a; transition: color 0.2s; line-height: 1; padding: 4px;
}
.star-btn:hover { color: #f59e0b; }
.card.starred .star-btn { color: #f59e0b; }

.badge {
  position: absolute; top: 8px; left: 10px; z-index: 2;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #fff;
  background: rgba(0,0,0,0.65); padding: 2px 7px; border-radius: 4px;
}
.card img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; display: block; background: #0d0d10; }
.info { padding: 12px 14px 14px; }
.info .label { font-size: 12px; font-weight: 600; color: #e8e8e8; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.info .style-desc { font-size: 10px; color: #555; font-family: 'JetBrains Mono', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.lightbox {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.93);
  z-index: 1000; flex-direction: column; justify-content: center; align-items: center;
}
.lightbox.open { display: flex; }
.lb-img { max-width: 80vw; max-height: 78vh; border-radius: 10px; object-fit: contain; display: block; }
.lb-caption { margin-top: 18px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #666; text-align: center; }

.lb-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  font-size: 40px; color: #444; cursor: pointer; padding: 16px 24px;
  user-select: none; line-height: 1; transition: color 0.15s;
}
.lb-btn:hover { color: #ddd; }
.lb-prev { left: 12px; }
.lb-next { right: 12px; }
.lb-close { position: absolute; top: 18px; right: 22px; font-size: 22px; color: #555; cursor: pointer; transition: color 0.15s; }
.lb-close:hover { color: #fff; }
.lb-star { position: absolute; top: 16px; right: 58px; font-size: 22px; color: #333; cursor: pointer; transition: color 0.2s; user-select: none; }
.lb-star:hover { color: #f59e0b; }
.lb-star.on { color: #f59e0b; }

footer { text-align: center; margin-top: 56px; font-size: 11px; color: #333; font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>

<header>
  <h1>Lyra — Logo Concepts</h1>
  <p id="subtitle">Loading...</p>
  <p style="font-size:11px;color:#e85d04;font-family:'JetBrains Mono',monospace;margin-top:4px;" id="star-count"></p>
</header>

<div class="batch-bar" id="batch-bar"></div>
<div class="filters" id="filters"></div>
<div class="grid" id="gallery"></div>

<div class="lightbox" id="lightbox">
  <span class="lb-close" id="lb-close">&times;</span>
  <span class="lb-star" id="lb-star" title="Star this concept">★</span>
  <span class="lb-btn lb-prev" id="lb-prev">&#x2039;</span>
  <span class="lb-btn lb-next" id="lb-next">&#x203a;</span>
  <img class="lb-img" id="lb-img" src="" alt="">
  <div class="lb-caption" id="lb-caption"></div>
</div>

<footer>Generated with Flux &middot; Lyra by Roxabi</footer>

<script>
/**
 * Auto-discovery gallery — reads manifest.json generated by build-manifest.py.
 * No manual IMAGES array needed. Just run: python3 brand/build-manifest.py
 */
(async function () {
  const gallery  = document.getElementById('gallery');
  const lightbox = document.getElementById('lightbox');
  const lbImg    = document.getElementById('lb-img');
  const lbCap    = document.getElementById('lb-caption');
  const filtersEl = document.getElementById('filters');
  const subtitle = document.getElementById('subtitle');

  // Auto-discover concepts from serve.py /api/list/ endpoint,
  // falling back to concepts/manifest.json for static serving.
  let IMAGES;
  try {
    let files;
    try {
      const res = await fetch('/api/list/brand/concepts');
      if (res.ok) {
        const listing = await res.json();
        files = listing.filter(f => f.name.endsWith('.png')).map(f => f.name);
      }
    } catch {}

    if (!files) {
      const res = await fetch('concepts/manifest.json');
      if (res.ok) {
        IMAGES = await res.json();
      }
    }

    // Add batch field to manifest entries if missing
    if (IMAGES && IMAGES.length && !IMAGES[0].batch) {
      IMAGES.forEach(i => { i.batch = i.num <= 132 ? 1 : 2; });
    }

    if (!IMAGES && files) {
      // Build IMAGES from directory listing
      IMAGES = files.sort().map(name => {
        const stem = name.replace('.png', '');
        const parts = stem.split('-');
        const num = parseInt(parts[0], 10) || 0;
        const slug = parts.slice(1).join('-');
        const label = slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

        // Auto-detect batch from number range
        let batch = num <= 32 ? 1 : num <= 132 ? 1 : 2;

        // Auto-detect category from slug
        let cat = 'Exploration';
        const s = slug.toLowerCase();
        if (num <= 7) cat = 'Early Exploration';
        else if (s.includes('forge-crystal')) cat = 'Forge Crystal';
        else if (s.includes('hub') || s.includes('constellation') || s.includes('orbital') || s.includes('spokes')) cat = 'Hub & Spokes';
        else if (s.includes('anvil')) cat = 'Anvil Foundation';
        else if (s.includes('spark') || s.includes('convergence') || s.includes('explosion') || s.includes('rising') || s.includes('data-stream')) cat = 'Spark Convergence';
        else if (s.includes('minimal')) cat = 'Minimal Icon';
        else if (s.includes('silhouette')) cat = 'Cinematic Silhouette';
        else if (s.includes('sphere')) cat = 'Minimalist Sphere';
        else if (s.includes('wave') || s.includes('ripple') || s.includes('frequency') || s.includes('harmonic') || s.includes('diffraction') || s.includes('duality') || s.includes('soliton') || s.includes('cymatics') || s.includes('pulse') || s.includes('interference') || s.includes('standing') || s.includes('schrodinger') || s.includes('entanglement') || s.includes('tunnel')) cat = 'Wave-Particle';
        else if (s.includes('anime') || s.includes('chibi')) cat = 'Anime Portrait';
        else if (s.includes('mark') || s.includes('diamond-3d') || s.includes('diamond-glass') || s.includes('diamond-stamp') || s.includes('diamond-neon') || s.includes('diamond-coin')) cat = 'Diamond Mark';

        // Auto-detect theme
        let theme = '';
        if (s.includes('amber') || s.includes('forge') || s.includes('anvil') || s.includes('ember') || s.includes('molten') || s.includes('smith') || s.includes('hoodie')) theme = 'amber';
        else if (s.includes('electric') || s.includes('electron') || s.includes('plasma') || s.includes('quantum') || s.includes('neural') || s.includes('blue') || s.includes('cyber') || s.includes('hacker') || s.includes('circuit') || s.includes('tesla') || s.includes('hologram')) theme = 'electric';

        return { file: name, num, label, cat, theme, batch };
      });
    }

    if (!IMAGES || IMAGES.length === 0) throw new Error('empty');
  } catch {
    subtitle.textContent = 'No concepts found. Generate images into brand/concepts/ first.';
    return;
  }

  // Sort by number — latest first
  IMAGES.sort((a, b) => b.num - a.num);
  subtitle.textContent = IMAGES.length + ' AI-generated logo concepts — click to enlarge';

  // ── Star system ──
  const starred = new Set(JSON.parse(localStorage.getItem('lyra-concepts-starred') || '[]'));
  function saveStarred() { localStorage.setItem('lyra-concepts-starred', JSON.stringify([...starred])); }
  function updateStarCount() {
    const el = document.getElementById('star-count');
    if (el) el.textContent = starred.size ? ` · ★ ${starred.size} starred` : '';
  }

  // ── Batch info ──
  const BATCH_SEEDS = {
    1: 'Initial exploration — 5 directions (Forge Crystal, Hub, Anvil, Spark, Minimal) + character concepts',
    2: 'Seed: #46 #69 #94 #97 #99 #100 #101 #102 #104 #108 #112 — anime portraits, hologram, glass circuit, duality',
  };

  const batches = [...new Set(IMAGES.map(i => i.batch))].sort();
  const batchBar = document.getElementById('batch-bar');
  let activeBatch = 'all';
  let activeFilter = 'all';

  const allBatchBtn = document.createElement('button');
  allBatchBtn.textContent = `ALL BATCHES (${IMAGES.length})`;
  allBatchBtn.className = 'active';
  allBatchBtn.addEventListener('click', () => setBatch('all'));
  batchBar.appendChild(allBatchBtn);

  batches.forEach(b => {
    const count = IMAGES.filter(i => i.batch === b).length;
    const btn = document.createElement('button');
    btn.textContent = `BATCH ${b} (${count})`;
    btn.dataset.batch = String(b);
    btn.addEventListener('click', () => setBatch(b));
    batchBar.appendChild(btn);
  });

  const seedEl = document.createElement('div');
  seedEl.className = 'batch-seed';
  seedEl.id = 'batch-seed';
  batchBar.parentNode.insertBefore(seedEl, batchBar.nextSibling);

  function setBatch(b) {
    activeBatch = b;
    batchBar.querySelectorAll('button').forEach(btn => {
      btn.classList.toggle('active', b === 'all' ? !btn.dataset.batch : btn.dataset.batch === String(b));
    });
    seedEl.textContent = b === 'all' ? '' : (BATCH_SEEDS[b] || '');
    applyFilters();
    rebuildCategoryFilters();
  }

  // ── Category filters ──
  function rebuildCategoryFilters() {
    filtersEl.innerHTML = '';
    const visible = activeBatch === 'all' ? IMAGES : IMAGES.filter(i => i.batch === activeBatch);
    const categories = [...new Set(visible.map(i => i.cat))].sort();

    const allBtn = document.createElement('button');
    allBtn.textContent = `ALL (${visible.length})`;
    allBtn.className = activeFilter === 'all' ? 'active' : '';
    allBtn.addEventListener('click', () => setFilter('all'));
    filtersEl.appendChild(allBtn);

    categories.forEach(cat => {
      const count = visible.filter(i => i.cat === cat).length;
      const btn = document.createElement('button');
      btn.textContent = `${cat} (${count})`;
      btn.dataset.cat = cat;
      btn.className = activeFilter === cat ? 'active' : '';
      btn.addEventListener('click', () => setFilter(cat));
      filtersEl.appendChild(btn);
    });

    const starBtn = document.createElement('button');
    starBtn.textContent = `★ STARRED (${starred.size})`;
    starBtn.dataset.starred = '1';
    starBtn.className = activeFilter === 'starred' ? 'active' : '';
    starBtn.style.borderColor = starred.size ? '#f59e0b' : '';
    starBtn.style.color = starred.size ? '#f59e0b' : '';
    starBtn.addEventListener('click', () => setFilter('starred'));
    filtersEl.appendChild(starBtn);
  }

  function setFilter(cat) {
    activeFilter = cat;
    filtersEl.querySelectorAll('button').forEach(b => {
      b.classList.toggle('active',
        cat === 'all'      ? !b.dataset.cat && !b.dataset.starred :
        cat === 'starred'  ? !!b.dataset.starred :
        b.dataset.cat === cat
      );
    });
    applyFilters();
  }

  function applyFilters() {
    document.querySelectorAll('.card').forEach(card => {
      const matchBatch   = activeBatch === 'all' || card.dataset.batch === String(activeBatch);
      const matchCat     = activeFilter === 'all' || card.dataset.cat === activeFilter;
      const matchStarred = activeFilter !== 'starred' || card.classList.contains('starred');
      card.classList.toggle('hidden', !(matchBatch && matchCat && matchStarred));
    });
  }

  rebuildCategoryFilters();

  let current = 0;
  const visibleImages = () => IMAGES.filter(i => activeFilter === 'all' || i.cat === activeFilter);

  function toggleStar(e, key, card) {
    e.stopPropagation();
    if (starred.has(key)) { starred.delete(key); card.classList.remove('starred'); }
    else                  { starred.add(key);    card.classList.add('starred'); }
    saveStarred();
    updateStarCount();
    rebuildCategoryFilters();
    if (activeFilter === 'starred') applyFilters();
  }

  IMAGES.forEach((item, i) => {
    const num  = String(item.num).padStart(3, '0');
    const key  = item.file;
    const card = document.createElement('div');
    card.className = 'card' + (starred.has(key) ? ' starred' : '');
    card.dataset.cat = item.cat;
    card.dataset.batch = String(item.batch);
    card.innerHTML =
      '<span class="badge">#' + num + '</span>' +
      '<img src="concepts/' + item.file + '" alt="' + item.label + '" loading="lazy">' +
      '<div class="info">' +
        '<div class="label">' + item.label + '</div>' +
        '<div class="style-desc">' + item.cat + (item.theme ? ' / ' + item.theme : '') + '</div>' +
      '</div>' +
      '<button class="star-btn" title="Star this concept">★</button>';
    card.querySelector('.star-btn').addEventListener('click', e => toggleStar(e, key, card));
    card.querySelector('img').addEventListener('click', () => openLB(i));
    card.querySelector('.info').addEventListener('click', () => openLB(i));
    card.querySelector('.badge').addEventListener('click', () => openLB(i));
    gallery.appendChild(card);
  });

  updateStarCount();

  const lbStar = document.getElementById('lb-star');

  function openLB(i) {
    current = i;
    const item = IMAGES[i];
    const num  = String(item.num).padStart(3, '0');
    lbImg.src  = 'concepts/' + item.file;
    lbImg.alt  = item.label;
    lbCap.textContent = '#' + num + ' ' + item.label + ' — ' + item.cat + (item.theme ? ' / ' + item.theme : '');
    lbStar.classList.toggle('on', starred.has(item.file));
    lightbox.classList.add('open');
  }

  lbStar.addEventListener('click', () => {
    const item = IMAGES[current];
    const card = gallery.children[IMAGES.length - 1 - current] || [...gallery.querySelectorAll('.card')].find(c => c.querySelector('img').alt === item.label);
    if (starred.has(item.file)) {
      starred.delete(item.file);
      lbStar.classList.remove('on');
      if (card) card.classList.remove('starred');
    } else {
      starred.add(item.file);
      lbStar.classList.add('on');
      if (card) card.classList.add('starred');
    }
    saveStarred();
    updateStarCount();
    rebuildCategoryFilters();
  });

  function closeLB() { lightbox.classList.remove('open'); }
  function nav(dir) { openLB((current + dir + IMAGES.length) % IMAGES.length); }

  document.getElementById('lb-close').addEventListener('click', closeLB);
  document.getElementById('lb-prev').addEventListener('click', (e) => { e.stopPropagation(); nav(-1); });
  document.getElementById('lb-next').addEventListener('click', (e) => { e.stopPropagation(); nav(1); });
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLB(); });
  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape')     closeLB();
    if (e.key === 'ArrowLeft')  nav(-1);
    if (e.key === 'ArrowRight') nav(1);
  });
}());
</script>
</body>
</html>
