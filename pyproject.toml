[project]
name = "lyra"
version = "0.1.0"
description = "Lyra by Roxabi — Personal AI agent engine"
requires-python = ">=3.12,<3.13"
dependencies = [
    "roxabi-vault",
    "pydantic>=2.12.5",
    # Adapters
    "aiogram>=3.26",       # Telegram — asyncio-native, tracks Bot API same-day
    "discord.py>=2.4",     # Discord — gateway WebSocket, on_message events
    # HTTP (webhook server for Telegram + inter-machine calls)
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "httpx[asyncio]>=0.28",
    "python-dotenv>=1.0",
    # Agent backends
    "anthropic>=0.49",
    # STT (via voiceCLI)
    "voicecli",
]

[project.optional-dependencies]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv]
override-dependencies = [
    "torch>=2.7",
    "torchaudio>=2.7",
    "transformers>=4.57.3",
    "numpy>=1.26",
]

[tool.uv.extra-build-dependencies]
pkuseg = ["numpy"]

[tool.uv.sources]
roxabi-vault = { git = "https://github.com/Roxabi/roxabi-vault.git", branch = "staging" }
voicecli = { git = "https://github.com/Roxabi/voiceCLI.git", branch = "staging" }

[tool.hatch.build.targets.wheel]
packages = ["src/lyra"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=lyra --cov-report=term-missing --cov-report=xml --cov-fail-under=50"

[tool.coverage.run]
branch = true
source = ["lyra"]

[tool.coverage.report]
show_missing = true

[tool.pyright]
pythonVersion = "3.12"
include = ["src", "tests"]
venvPath = "."
venv = ".venv"

[tool.ruff]
exclude = [".claude/worktrees"]

[tool.ruff.lint]
select = ["E", "F", "I", "C901", "PLR0913", "PLR0915"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-statements = 50
max-args = 5

[tool.ruff.format]

[dependency-groups]
dev = [
    "pip-licenses>=5.5.1",
    "pre-commit>=4.5.1",
    "pyright>=1.1",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=6.0",
    "ruff>=0.3",
]
