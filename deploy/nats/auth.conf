# NATS nkey authorization — Lyra by Roxabi
# Spec: artifacts/specs/706-per-role-nkeys-acls-spec.mdx
# Provisioning: deploy/nats/gen-nkeys.sh --regenerate --yes
#
# This file is the tracked template with placeholder pubkeys.
# On Machine 1 the live copy lives at /etc/nats/nkeys/auth.conf and contains
# real pubkeys generated by gen-nkeys.sh.
#
# TODO(ADR-045): ACL for roxabi-nats SDK identities intentionally omitted
#                until the SDK extraction lands — rerun gen-nkeys.sh then.
authorization {
  default_permissions: {
    publish:   { deny: [">"] }
    subscribe: { deny: [">"] }
  }
  users: [
    {
      nkey: "UDUMMYHUB"
      # hub
      permissions: {
        publish:   { allow: ["lyra.outbound.telegram.>","lyra.outbound.discord.>","lyra.voice.tts.request","lyra.voice.stt.request","lyra.llm.request"] }
        subscribe: { allow: ["lyra.inbound.telegram.>","lyra.inbound.discord.>","lyra.voice.tts.heartbeat","lyra.voice.stt.heartbeat","lyra.llm.health.*","lyra.system.ready","_INBOX.>"] }
        allow_responses: true
      }
    }
    {
      nkey: "UDUMMYTELEGRAMADAPTER"
      # telegram-adapter
      permissions: {
        publish:   { allow: ["lyra.inbound.telegram.>","lyra.system.ready"] }
        subscribe: { allow: ["lyra.outbound.telegram.>"] }
        allow_responses: true
      }
    }
    {
      nkey: "UDUMMYDISCORDADAPTER"
      # discord-adapter
      permissions: {
        publish:   { allow: ["lyra.inbound.discord.>","lyra.system.ready"] }
        subscribe: { allow: ["lyra.outbound.discord.>"] }
        allow_responses: true
      }
    }
    {
      nkey: "UDUMMYTTSADAPTER"
      # tts-adapter
      permissions: {
        publish:   { allow: ["lyra.voice.tts.heartbeat"] }
        subscribe: { allow: ["lyra.voice.tts.request"] }
        allow_responses: true
      }
    }
    {
      nkey: "UDUMMYSTTADAPTER"
      # stt-adapter
      permissions: {
        publish:   { allow: ["lyra.voice.stt.heartbeat"] }
        subscribe: { allow: ["lyra.voice.stt.request"] }
        allow_responses: true
      }
    }
    # voice-tts: voicecli nats-serve worker on Machine 1 (#689)
    # TODO(689): set to actual nkey pubkey from ~/.lyra/nkeys/voice-tts.seed -> public
    {
      nkey: "UAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
      # voice-tts
      permissions: {
        publish:   { allow: ["lyra.voice.tts.heartbeat","_INBOX.>"] }
        subscribe: { allow: ["lyra.voice.tts.request"] }
        allow_responses: true
      }
    }
    # voice-stt: voicecli nats-serve worker on Machine 1 (#689)
    # TODO(689): set to actual nkey pubkey from ~/.lyra/nkeys/voice-stt.seed -> public
    {
      nkey: "UBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB"
      # voice-stt
      permissions: {
        publish:   { allow: ["lyra.voice.stt.heartbeat","_INBOX.>"] }
        subscribe: { allow: ["lyra.voice.stt.request"] }
        allow_responses: true
      }
    }
    {
      nkey: "UDUMMYLLMWORKER"
      # llm-worker
      permissions: {
        publish:   { allow: ["lyra.llm.health.*"] }
        subscribe: { allow: ["lyra.llm.request"] }
        allow_responses: true
      }
    }
    {
      nkey: "UDUMMYMONITOR"
      # monitor
      permissions: {
        publish:   { allow: ["lyra.monitor.>"] }
        subscribe: { allow: ["lyra.monitor.>"] }
        allow_responses: true
      }
    }
  ]
}
