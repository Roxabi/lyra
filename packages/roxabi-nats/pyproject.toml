[project]
name = "roxabi-nats"
version = "0.1.0"
description = "NATS transport SDK for Lyra and Roxabi plugin ecosystem"
requires-python = ">=3.12"
dependencies = [
    "nats-py>=2.6",
    "nkeys>=0.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/roxabi_nats"]
