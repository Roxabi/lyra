# Dev fallback only — not registered by make register.
# Start manually: supervisorctl start lyra_all
# Do NOT symlink this into lyra-stack/conf.d/ — it has no LYRA_HEALTH_PORT and would
# collide on port 8443 with lyra_telegram if both are running simultaneously.
[program:lyra_all]
command=%(ENV_HOME)s/projects/lyra/supervisor/scripts/run.sh
directory=%(ENV_HOME)s/projects/lyra
environment=HOME="%(ENV_HOME)s",PATH="%(ENV_HOME)s/.local/bin:%(ENV_HOME)s/projects/lyra/.venv/bin:%(ENV_PATH)s",LYRA_HEALTH_PORT="8445"
autostart=false
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=10
stopasgroup=true
killasgroup=true
stdout_logfile=%(ENV_HOME)s/.local/state/lyra/logs/lyra_all.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=%(ENV_HOME)s/.local/state/lyra/logs/lyra_all_error.log
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=3
