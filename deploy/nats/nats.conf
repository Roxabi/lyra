# NATS Server — Lyra by Roxabi
# Machine 1 (Hub) configuration
# Install to: /etc/nats/nats.conf
# Installed by: lyra/deploy/nats/install.sh

# Bind to LAN interface only — defence-in-depth alongside UFW rule for port 4222.
# Update to match Machine 1 LAN IP if it changes.
host: 192.168.1.16
port: 4222

pid_file: "/run/nats-server/nats-server.pid"

# ── TLS ────────────────────────────────────────────────────────────────────
# Cipher suites are TLS 1.3 only — connections using TLS 1.2 or older are
# rejected at the TLS handshake layer.
tls {
  cert_file: "/etc/nats/certs/server.crt"
  key_file:  "/etc/nats/certs/server.key"
  ca_file:   "/etc/nats/certs/ca.crt"
  timeout:   5

  # TLS 1.3-only cipher suites (Go rejects TLS 1.2 when only these are listed)
  cipher_suites: [
    "TLS_AES_128_GCM_SHA256"
    "TLS_AES_256_GCM_SHA384"
    "TLS_CHACHA20_POLY1305_SHA256"
  ]
}

# ── nkey auth ──────────────────────────────────────────────────────────────
# Public keys written by deploy/nats/gen-nkeys.sh into /etc/nats/nkeys/auth.conf
# Do not edit auth.conf manually — regenerate with gen-nkeys.sh
include "/etc/nats/nkeys/auth.conf"

# ── Resource limits ────────────────────────────────────────────────────────
max_connections: 20      # 3 nkey clients + headroom; reject unexpected connections fast
max_payload:     8388608 # 8MB — generous for LLM request/response payloads

# ── Monitoring ─────────────────────────────────────────────────────────────
# Disabled until Slice A3 (lyra-monitor health probe) is implemented.
# When re-enabled, bind to localhost only: http: 127.0.0.1 / http_port: 8222

logtime: true
