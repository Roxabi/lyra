# NATS nkey authorization — generated by gen-nkeys.sh
# Spec: artifacts/specs/706-per-role-nkeys-acls-spec.mdx
# TODO(ADR-045): ACL for roxabi-nats SDK identities intentionally omitted
#                until the SDK extraction lands — rerun this script then.
# DO NOT edit manually — regenerate with: sudo ./deploy/nats/gen-nkeys.sh --regenerate
authorization {
  default_permissions: {
    publish:   { deny: [">"] }
    subscribe: { deny: [">"] }
  }
  users: [
    {
      nkey: "UDUMMYHUB"
      # hub
      permissions: {
        publish:   { allow: ["lyra.outbound.telegram.>","lyra.outbound.discord.>","lyra.voice.tts.request.>","lyra.voice.stt.request.>","lyra.llm.request","lyra.image.generate.request","lyra.clipool.cmd","lyra.clipool.control","lyra.audit.>"] }
        subscribe: { allow: ["lyra.inbound.telegram.>","lyra.inbound.discord.>","lyra.voice.tts.heartbeat","lyra.voice.stt.heartbeat","lyra.llm.health.*","lyra.system.ready","lyra.image.heartbeat","lyra.clipool.heartbeat","_inbox.hub.>"] }
        allow_responses: false
      }
    }
    {
      nkey: "UDUMMYTELEGRAMADAPTER"
      # telegram-adapter
      permissions: {
        publish:   { allow: ["lyra.inbound.telegram.>","lyra.system.ready"] }
        subscribe: { allow: ["lyra.outbound.telegram.>","_inbox.telegram-adapter.>","_inbox.telegram-adapter.*.*"] }
        allow_responses: false
      }
    }
    {
      nkey: "UDUMMYDISCORDADAPTER"
      # discord-adapter
      permissions: {
        publish:   { allow: ["lyra.inbound.discord.>","lyra.system.ready"] }
        subscribe: { allow: ["lyra.outbound.discord.>","_inbox.discord-adapter.>","_inbox.discord-adapter.*.*"] }
        allow_responses: false
      }
    }
    {
      nkey: "UDUMMYVOICETTS"
      # voice-tts
      permissions: {
        publish:   { allow: ["lyra.voice.tts.heartbeat","lyra.system.ready","_inbox.hub.>"] }
        subscribe: { allow: ["lyra.voice.tts.request","lyra.voice.tts.request.>","_inbox.voice-tts.>"] }
        allow_responses: true
      }
    }
    {
      nkey: "UDUMMYVOICESTT"
      # voice-stt
      permissions: {
        publish:   { allow: ["lyra.voice.stt.heartbeat","lyra.system.ready","_inbox.hub.>"] }
        subscribe: { allow: ["lyra.voice.stt.request","lyra.voice.stt.request.>","_inbox.voice-stt.>"] }
        allow_responses: true
      }
    }
    {
      nkey: "UDUMMYLLMWORKER"
      # llm-worker
      permissions: {
        publish:   { allow: ["lyra.llm.health.*","_inbox.hub.>"] }
        subscribe: { allow: ["lyra.llm.request"] }
        allow_responses: true
      }
    }
    {
      nkey: "UDUMMYIMAGEWORKER"
      # image-worker
      permissions: {
        publish:   { allow: ["lyra.image.heartbeat","_inbox.hub.>"] }
        subscribe: { allow: ["lyra.image.generate.request","_inbox.image-worker.>"] }
        allow_responses: true
      }
    }
    {
      nkey: "UDUMMYMONITOR"
      # monitor
      permissions: {
        publish:   { allow: ["lyra.monitor.>"] }
        subscribe: { allow: ["lyra.monitor.>"] }
        allow_responses: false
      }
    }
    {
      nkey: "UDUMMYCLIPOOLWORKER"
      # clipool-worker
      permissions: {
        publish:   { allow: ["lyra.clipool.heartbeat","lyra.system.ready","_inbox.hub.>"] }
        subscribe: { allow: ["lyra.clipool.cmd","lyra.clipool.control","_inbox.clipool-worker.>"] }
        allow_responses: true
      }
    }
  ]
}
