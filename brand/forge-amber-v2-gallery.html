<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyra — Forge Amber v2 Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0e0e0; font-family: 'Inter', sans-serif; padding: 48px 24px 64px; min-height: 100vh; }

header { text-align: center; margin-bottom: 12px; }
header h1 {
  font-family: 'Outfit', sans-serif; font-weight: 800;
  font-size: 32px; color: #fafafa; margin-bottom: 6px;
  letter-spacing: 0.06em;
}
header .brand-sub {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: #e85d04; letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 10px;
}
header .meta { font-size: 12px; color: #6b7280; font-family: 'JetBrains Mono', monospace; }

.direction-tag {
  display: inline-block; margin: 18px auto 36px;
  padding: 6px 16px; border: 1px solid #2a2a35; border-radius: 20px;
  font-size: 11px; font-family: 'JetBrains Mono', monospace; color: #6b7280;
  background: #18181f;
}
.direction-tag span { color: #e85d04; }

.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 1600px; margin: 0 auto; }
@media (max-width: 1200px) { .grid { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 900px)  { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 600px)  { .grid { grid-template-columns: repeat(2, 1fr); } }

.card {
  background: #18181f; border: 1px solid #2a2a35; border-radius: 12px;
  overflow: hidden; cursor: pointer; position: relative;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
}
.card:hover {
  border-color: #e85d04;
  transform: translateY(-4px);
  box-shadow: 0 8px 32px rgba(232, 93, 4, 0.18);
}

.badge {
  position: absolute; top: 8px; left: 10px; z-index: 2;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #fafafa;
  background: rgba(10, 10, 15, 0.8); padding: 2px 7px; border-radius: 4px;
  border: 1px solid #2a2a35;
}
.card img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; display: block; background: #0a0a0f; }
.info { padding: 12px 14px 14px; }
.info .label {
  font-size: 12px; font-weight: 600; color: #fafafa;
  margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.info .style-desc {
  font-size: 10px; color: #6b7280; font-family: 'JetBrains Mono', monospace;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* Lightbox */
.lightbox {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96);
  z-index: 1000; flex-direction: column; justify-content: center; align-items: center;
}
.lightbox.open { display: flex; }
.lb-img { max-width: 80vw; max-height: 78vh; border-radius: 10px; object-fit: contain; display: block; border: 1px solid #2a2a35; }
.lb-caption { margin-top: 18px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #6b7280; text-align: center; }

.lb-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  font-size: 40px; color: #2a2a35; cursor: pointer; padding: 16px 24px;
  user-select: none; line-height: 1; transition: color 0.15s;
}
.lb-btn:hover { color: #e85d04; }
.lb-prev { left: 12px; }
.lb-next { right: 12px; }
.lb-close { position: absolute; top: 18px; right: 22px; font-size: 22px; color: #6b7280; cursor: pointer; transition: color 0.15s; }
.lb-close:hover { color: #fafafa; }

footer {
  text-align: center; margin-top: 56px;
  font-size: 11px; color: #2a2a35; font-family: 'JetBrains Mono', monospace;
}
footer span { color: #e85d04; }
</style>
</head>
<body>

<header>
  <div class="brand-sub">Lyra by Roxabi</div>
  <h1>Forge Amber v2</h1>
  <p class="meta" id="proj-subtitle"></p>
</header>

<div style="text-align:center">
  <span class="direction-tag">Direction <span>H — Forge</span> · amber + forge orange · diamond on anvil · 512×512 · flux2-klein</span>
</div>

<div class="grid" id="gallery"></div>

<div class="lightbox" id="lightbox">
  <span class="lb-close" id="lb-close">✕</span>
  <span class="lb-btn lb-prev" id="lb-prev">&#x2039;</span>
  <span class="lb-btn lb-next" id="lb-next">&#x203a;</span>
  <img class="lb-img" id="lb-img" src="" alt="">
  <div class="lb-caption" id="lb-caption"></div>
</div>

<footer>Generated with <span>Flux</span> · Lyra brand exploration · 2026-03-25</footer>

<script>
// __IMAGES_DATA__
const PROJECT_NAME = "Lyra — Forge Amber v2";

const IMAGES = [
  { num: 233, src: "concepts/233-amber-prism-refraction.png",       label: "Amber Prism Refraction",       style: "amber crystal prism · volumetric light beams · anvil base" },
  { num: 234, src: "concepts/234-forge-diamond-crosssection.png",   label: "Forge Diamond Cross-section",  style: "geological strata · white-hot nucleus · cutaway view" },
  { num: 235, src: "concepts/235-amber-lattice-mark.png",           label: "Amber Lattice Mark",           style: "crystalline lattice · amber nodes · diamond silhouette" },
  { num: 236, src: "concepts/236-minimal-amber-diamond-spark.png",  label: "Minimal Amber Diamond Spark",  style: "ultra-minimal · stroke only · single spark centroid" },
  { num: 237, src: "concepts/237-forge-glyph-flat.png",             label: "Forge Glyph Flat",             style: "flat 2D · amber fill · hard edges · brand glyph" },
  { num: 238, src: "concepts/238-amber-crystal-shards.png",         label: "Amber Crystal Shards",         style: "broken shards · amber refraction · forge orange backlight" },
  { num: 239, src: "concepts/239-forge-compression-rings.png",      label: "Forge Compression Rings",      style: "concentric strata · white-hot core → amber edges · anvil" },
  { num: 240, src: "concepts/240-amber-ember-orbit.png",            label: "Amber Ember Orbit",            style: "orbital particles · ember trails · forge glow corona" },
  { num: 241, src: "concepts/241-forge-seal-emblem.png",            label: "Forge Seal Emblem",            style: "circular badge · industrial ring · aged warm iron" },
  { num: 242, src: "concepts/242-amber-crystal-growth.png",         label: "Amber Crystal Growth",         style: "crystallization in progress · rough tip · forge glow point" },
  { num: 243, src: "concepts/243-amber-thermal-topdown.png",        label: "Amber Thermal Top-down",       style: "overhead heatmap · radial gradient · white-hot → amber" },
  { num: 244, src: "concepts/244-iron-amber-split.png",             label: "Iron / Amber Split",           style: "cold iron ↔ warm amber · split diamond · contrast study" },
  { num: 245, src: "concepts/245-amber-wire-edge-glow.png",         label: "Amber Wire Edge Glow",         style: "wireframe only · luminous amber edges · neon on obsidian" },
  { num: 246, src: "concepts/246-forge-amber-stamp.png",            label: "Forge Amber Stamp",            style: "hot-brand burn mark · textured iron · maker pride" },
  { num: 247, src: "concepts/247-amber-diamond-floating-sparks.png",label: "Amber Diamond Floating Sparks",style: "hovering diamond · spark burst from gap · cinematic key light" },
];

(function () {
  const gallery  = document.getElementById('gallery');
  const lightbox = document.getElementById('lightbox');
  const lbImg    = document.getElementById('lb-img');
  const lbCap    = document.getElementById('lb-caption');

  document.getElementById('proj-subtitle').textContent =
    IMAGES.length + ' AI-generated concepts — amber + forge direction · click to enlarge';

  let current = 0;

  IMAGES.forEach((item, i) => {
    const num  = String(item.num ?? i + 1).padStart(3, '0');
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<span class="badge">#' + num + '</span>' +
      '<img src="' + item.src + '" alt="' + item.label + '" loading="lazy">' +
      '<div class="info">' +
        '<div class="label">' + item.label + '</div>' +
        '<div class="style-desc">' + item.style + '</div>' +
      '</div>';
    card.addEventListener('click', () => open(i));
    gallery.appendChild(card);
  });

  function open(i) {
    current = i;
    const item = IMAGES[i];
    const num  = String(item.num ?? i + 1).padStart(3, '0');
    lbImg.src  = item.src;
    lbImg.alt  = item.label;
    lbCap.textContent = '#' + num + ' ' + item.label + ' — ' + item.style;
    lightbox.classList.add('open');
  }

  function close() { lightbox.classList.remove('open'); }
  function nav(dir) { open((current + dir + IMAGES.length) % IMAGES.length); }

  document.getElementById('lb-close').addEventListener('click', close);
  document.getElementById('lb-prev').addEventListener('click', (e) => { e.stopPropagation(); nav(-1); });
  document.getElementById('lb-next').addEventListener('click', (e) => { e.stopPropagation(); nav(1); });
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) close(); });
  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape')     close();
    if (e.key === 'ArrowLeft')  nav(-1);
    if (e.key === 'ArrowRight') nav(1);
  });
}());
</script>
</body>
</html>
