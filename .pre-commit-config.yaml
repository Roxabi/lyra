repos:
  - repo: local
    hooks:
      - id: lint
        name: lint
        entry: uv run ruff check .
        language: system
        pass_filenames: false
      - id: typecheck
        name: typecheck
        entry: uv run pyright
        language: system
        pass_filenames: false
      - id: gitleaks
        name: gitleaks secret scan
        entry: gitleaks detect --source . --no-git
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: license
        name: license check
        entry: uv run tools/license_check.py
        language: system
        pass_filenames: false
        stages: [pre-push]
