# NATS Server — local single-machine config (no TLS, no auth)
# ⚠ DEV ONLY — never deploy on a multi-machine or LAN-accessible setup.
# Use this on a single machine where NATS is only accessed from localhost.
# Upgrade to nats.conf (TLS + nkeys) when splitting to multi-machine.
#
# Install: sudo install -m 644 deploy/nats/nats-local.conf /etc/nats/nats.conf
# Start:   sudo systemctl start nats.service

host: 127.0.0.1
port: 4222

pid_file: "/run/nats-server/nats-server.pid"

max_connections: 20
max_payload:     52428800  # 50 MB — supports large audio, images, video over NATS

logtime: true
