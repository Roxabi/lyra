<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyra — Architecture Diagram Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0e0e0; font-family: 'Inter', sans-serif; padding: 48px 24px 64px; min-height: 100vh; }
header { text-align: center; margin-bottom: 36px; }
header h1 { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 32px; color: #fafafa; margin-bottom: 6px; letter-spacing: 0.06em; }
header .brand-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #e85d04; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
header .meta { font-size: 12px; color: #6b7280; font-family: 'JetBrains Mono', monospace; }
.grid { display: grid; grid-template-columns: 1fr; gap: 28px; max-width: 1200px; margin: 0 auto; }
.card { background: #18181f; border: 1px solid #2a2a35; border-radius: 12px; overflow: hidden; cursor: pointer; position: relative; transition: border-color 0.2s, box-shadow 0.2s; }
.card:hover { border-color: #e85d04; box-shadow: 0 8px 40px rgba(232,93,4,0.18); }
.badge { position: absolute; top: 12px; left: 14px; z-index: 2; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #fafafa; background: rgba(10,10,15,0.85); padding: 3px 9px; border-radius: 4px; border: 1px solid #2a2a35; }
.card img { width: 100%; display: block; background: #0a0a0f; }
.info { padding: 14px 16px 16px; }
.info .label { font-size: 13px; font-weight: 600; color: #fafafa; margin-bottom: 4px; }
.info .style-desc { font-size: 11px; color: #6b7280; font-family: 'JetBrains Mono', monospace; }
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
.lightbox.open { display: flex; }
.lb-img { max-width: 92vw; max-height: 85vh; border-radius: 8px; object-fit: contain; display: block; }
.lb-caption { margin-top: 16px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #6b7280; text-align: center; }
.lb-close { position: absolute; top: 18px; right: 22px; font-size: 22px; color: #6b7280; cursor: pointer; transition: color 0.15s; }
.lb-close:hover { color: #fafafa; }
footer { text-align: center; margin-top: 56px; font-size: 11px; color: #2a2a35; font-family: 'JetBrains Mono', monospace; }
footer span { color: #e85d04; }
</style>
</head>
<body>
<header>
  <div class="brand-sub">Lyra by Roxabi</div>
  <h1>Architecture Diagrams</h1>
  <p class="meta">Isometric multi-agent hub-and-spoke · 1024×576 · flux2-klein · click to fullscreen</p>
</header>
<div class="grid" id="gallery"></div>
<div class="lightbox" id="lightbox">
  <span class="lb-close" id="lb-close">✕</span>
  <img class="lb-img" id="lb-img" src="" alt="">
  <div class="lb-caption" id="lb-caption"></div>
</div>
<footer>Generated with <span>Flux</span> · Lyra brand exploration · 2026-03-25</footer>
<script>
const IMAGES = [
  { num: 294, src: "concepts/294-iso-multiagent-architecture.png",  label: "Multi-Agent Architecture — Standard",    style: "hex platform · diamond mark · 3 satellite tiles (terminal, chat, discord) · orange data streams" },
  { num: 295, src: "concepts/295-iso-multiagent-night-glow.png",    label: "Multi-Agent Architecture — Night Glow",  style: "nighttime · ambient glow · neon data packets · cyberpunk warmth" },
  { num: 296, src: "concepts/296-iso-multiagent-minimal-clean.png", label: "Multi-Agent Architecture — Minimal",     style: "flat minimal · 6 satellites · clean geometry · technical diagram" },
];
(function () {
  const gallery = document.getElementById('gallery');
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbCap = document.getElementById('lb-caption');
  IMAGES.forEach((item, i) => {
    const num = String(item.num).padStart(3,'0');
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<span class="badge">#' + num + '</span><img src="' + item.src + '" alt="' + item.label + '" loading="lazy"><div class="info"><div class="label">' + item.label + '</div><div class="style-desc">' + item.style + '</div></div>';
    card.addEventListener('click', () => { lbImg.src = item.src; lbImg.alt = item.label; lbCap.textContent = '#' + num + ' ' + item.label; lightbox.classList.add('open'); });
    gallery.appendChild(card);
  });
  document.getElementById('lb-close').addEventListener('click', () => lightbox.classList.remove('open'));
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.classList.remove('open'); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') lightbox.classList.remove('open'); });
}());
</script>
</body>
</html>
