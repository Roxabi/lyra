title = 'Gitleaks'

[extend]
  useDefault = true

[allowlist]
  description = 'Project-level allowlist for known safe values'
  paths = ['.env.example', '.env', 'config.toml', 'artifacts/specs/', 'artifacts/plans/', 'artifacts/frames/', 'artifacts/analyses/']
  regexes = [
    'change-me-to-a-random-secret',
    'your-.*-token',
    'your-.*-key',
    'Telegram/Discord',
  ]
