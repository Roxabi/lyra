# agents.yml — Declarative agent registry for supervisord conf.d generation
# Run: make gen-conf  →  generates deploy/supervisor/conf.d/*.conf

schema_version: "1.0"

# Per-entry `role:` controls launcher dispatch in deploy/gen-supervisor-conf.py:
#   role: hub                 → run_hub.sh (name must be 'hub')
#   role: lyra-adapter        → run_adapter.sh <name> (default)
#   role: external-satellite  → command_override (required on the entry)
# Optional — inferred when absent; see resolve_role in gen-supervisor-conf.py.

defaults:
  autostart: false
  autorestart: true
  startsecs: 5
  startretries: 3
  stopwaitsecs: 75
  stopasgroup: true
  killasgroup: true
  stdout_logfile_maxbytes: 10MB
  stdout_logfile_backups: 3
  stderr_logfile_maxbytes: 5MB
  stderr_logfile_backups: 3
  # Paths are templated: {home}, {project_dir}, {logs_dir}
  directory: "{project_dir}"
  stdout_logfile: "{logs_dir}/{program}.log"
  stderr_logfile: "{logs_dir}/{program}_error.log"

agents:
  hub:
    role: hub
    command: lyra hub
    priority: 100
    startsecs: 10
    nkey: hub.seed
    env:
      LYRA_HEALTH_PORT: "8443"

  telegram:
    role: lyra-adapter
    command: lyra adapter telegram
    priority: 200
    nkey: telegram-adapter.seed

  discord:
    role: lyra-adapter
    command: lyra adapter discord
    priority: 200
    nkey: discord-adapter.seed

  stt:
    role: lyra-adapter
    command: lyra adapter stt
    priority: 200
    nkey: stt-adapter.seed
    env:
      LYRA_STT_ENABLED: "1"

  tts:
    role: lyra-adapter
    command: lyra adapter tts
    priority: 200
    nkey: tts-adapter.seed
    env:
      LYRA_TTS_ENABLED: "1"
      LYRA_TTS_ENGINE: "chatterbox"

# Satellite-owned workers (imageCLI, future llmCLI, forge, idna) are NOT listed here.
# They ship their own supervisor confs in their own repos and register on dev's hub
# supervisor (~/projects/conf.d/) via `make register`. Prod supervisor only loads
# lyra-owned programs generated from this file.
#
# Adding a satellite worker here again (like the former imagecli_gen entry) would
# leak a broken config to prod via git sync — the binary won't be in lyra's venv.
# See: ADR-047 (Pattern B ownership), ADR-050 (lyra↔imagecli NATS contract),
# imageCLI#50 (satellite-owned nats-serve, shipped 2026-04-15).
