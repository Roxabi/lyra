[project]
name = "roxabi-contracts"
version = "0.3.0"
description = "Shared Pydantic schemas for Lyra cross-project NATS contracts"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [{ name = "Roxabi SAS", email = "mickael@bouly.io" }]
dependencies = ["pydantic>=2"]

[project.optional-dependencies]
# scipy + numpy are required by roxabi_contracts.voice.fixtures (silence_wav_16khz).
# nats-py and roxabi-nats have moved to roxabi-nats[testing] (ADR-059 V6).
testing = ["scipy>=1.11"]

[project.urls]
Repository = "https://github.com/Roxabi/lyra"
Issues = "https://github.com/Roxabi/lyra/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/roxabi_contracts"]

[dependency-groups]
test = ["pytest", "roxabi-nats[testing]"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--import-mode=importlib"
