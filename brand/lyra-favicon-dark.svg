<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 170" role="img">
  <title>Lyra — Favicon (Diamond) Dark</title>
  <defs>
    <linearGradient id="fd-dF" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e85d04" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#b34500" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="fd-cG" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="1"/>
      <stop offset="50%" stop-color="#e85d04" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e85d04" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g>
    <!-- Outline for shape visibility at small sizes -->
    <polygon points="120,14 182,82 156,142 120,158 84,142 58,82"
      fill="url(#fd-dF)" stroke="#e85d04" stroke-width="4" stroke-opacity="0.6"/>
    <!-- Top facet — brightest -->
    <polygon points="120,14 58,82 182,82" fill="#f97316" fill-opacity="0.25"/>
    <!-- Left facet -->
    <polygon points="120,14 58,82 84,142 120,100" fill="#e85d04" fill-opacity="0.35"/>
    <!-- Right facet -->
    <polygon points="120,14 182,82 156,142 120,100" fill="#f97316" fill-opacity="0.25"/>
    <!-- Bottom facets -->
    <polygon points="58,82 84,142 120,158 120,100" fill="#e85d04" fill-opacity="0.2"/>
    <polygon points="182,82 156,142 120,158 120,100" fill="#b34500" fill-opacity="0.18"/>
    <!-- Core glow -->
    <circle cx="120" cy="88" r="50" fill="url(#fd-cG)"/>
    <!-- Hub dot -->
    <circle cx="120" cy="88" r="8" fill="#fafafa" opacity="0.9"/>
  </g>
</svg>
