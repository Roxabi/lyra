# Agent configuration for Lyra default agent.
# One file per agent — model + backend are here, not hardcoded.
# Future: a model-selector SLM will override [model] at runtime.

[agent]
name = "lyra_default"
memory_namespace = "lyra"
permissions = []
persona = "lyra_default"
show_intermediate = false  # set to true to show ⏳-prefixed intermediate turns

[model]
# backend: "claude-cli" uses the Claude Code subscription (stream-json protocol)
#          "ollama" will use a local model via Ollama HTTP API (future)
backend = "claude-cli"
model = "claude-sonnet-4-6"
max_turns = 10
# tools: explicit allowlist — omits Bash and Write to prevent prompt injection → RCE
# To disable all tools: tools = [] and ensure --allowedTools is passed (see cli_pool.py)
tools = ["Read", "Grep", "Glob", "WebFetch", "WebSearch"]

# [prompt]
# system = "..."     # Optional: raw string overrides persona composition

[agent.smart_routing]
# Smart routing selects the cheapest model capable of handling each message.
# Requires backend = "anthropic-sdk" — does NOT work with "claude-cli".
enabled = false
# history_size = 50   # routing decisions kept in memory (default: 50)
# high_complexity_commands = ["analyze", "review"]  # slash commands that force COMPLEX tier (+2)

[agent.smart_routing.models]
# Score → tier: 0=TRIVIAL, 1=SIMPLE, 2-3=MODERATE, 4+=COMPLEX
# Additive signals: complex keywords +2, moderate keywords +1, attachment +1,
#   high_complexity_commands match +2, turns>20 +2, turns>10 +1
trivial  = "claude-haiku-4-5-20251001"
simple   = "claude-haiku-4-5-20251001"
moderate = "claude-sonnet-4-6"
complex  = "claude-opus-4-6"

[plugins]
enabled = ["echo"]

# [workspaces]
# lyra        = "~/projects/lyra"
# projects    = "~/projects"
# roxabi-vault = "~/.roxabi-vault"
