<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyra — Logo Forge v0.2.2</title>
<meta name="diagram:title" content="Lyra Logo Forge v0.2.2">
<meta name="diagram:date" content="2026-03-18">
<meta name="diagram:category" content="lyra">
<meta name="diagram:cat-label" content="Lyra Brand">
<meta name="diagram:color" content="amber">
<meta name="diagram:badges" content="latest">
<!-- diagram-meta:end -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --obsidian:   #0a0a0f;
  --forge:      #e85d04;
  --ember:      #f97316;
  --steel:      #2a2a35;
  --steel-gray: #6b7280;
  --spark:      #fafafa;
  --iron:       #1f2937;
}

html, body { width: 100%; min-height: 100vh; overflow-x: hidden; }
body {
  background: var(--obsidian);
  display: flex; flex-direction: column; align-items: center;
  font-family: 'Inter', sans-serif;
}

.bg-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }

.page-header { position: relative; z-index: 1; text-align: center; padding: 22px 16px 2px; }
.page-header h1 {
  font-family: 'Outfit', sans-serif; font-weight: 800;
  font-size: clamp(16px, 2.5vw, 24px); letter-spacing: 0.18em; color: var(--spark);
}
.page-header .sub {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 0.16em; color: var(--steel-gray); margin-top: 3px;
}

/* ── Grid ─────────────────────────────── */
.grid {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 6px; max-width: 1200px; width: 100%;
  padding: 10px 10px 30px;
}

.cell {
  background: #0e0e15; border: 1px solid #1a1a24; border-radius: 5px;
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 4px 10px; transition: border-color 0.3s;
  opacity: 0; animation: fadeIn 0.5s ease-out 0.15s forwards;
}
.cell:hover { border-color: var(--forge); }

.cell svg.mark { display: block; overflow: visible; width: 100%; max-width: 240px; height: auto; }

.cell .wordmark {
  font-family: 'Outfit', sans-serif; font-weight: 800;
  font-size: clamp(14px, 2.2vw, 22px); letter-spacing: 0.22em; color: var(--spark);
  text-shadow: 0 0 18px rgba(232,93,4,0.4), 0 0 40px rgba(232,93,4,0.15);
  margin-top: 10px; opacity: 0; transform: translateY(6px);
  animation: wordIn 0.6s cubic-bezier(0.22,1,0.36,1) 5.8s forwards;
}
@keyframes wordIn { to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { to { opacity: 1; } }

.cell .wordmark.idle {
  animation: wordIn 0.6s cubic-bezier(0.22,1,0.36,1) 5.8s forwards,
             wordGlow 3.5s ease-in-out 6.6s infinite;
}
@keyframes wordGlow {
  0%, 100% { text-shadow: 0 0 18px rgba(232,93,4,0.4), 0 0 40px rgba(232,93,4,0.15); }
  50%      { text-shadow: 0 0 26px rgba(249,115,22,0.6), 0 0 60px rgba(232,93,4,0.25); }
}

.cell .tagline {
  font-family: 'JetBrains Mono', monospace; font-weight: 300;
  font-size: clamp(6px, 0.9vw, 9px); letter-spacing: 0.18em;
  color: var(--steel-gray); text-transform: lowercase;
  margin-top: 3px; opacity: 0; animation: fadeIn 0.8s ease-out 6.4s forwards;
}

.cell .anvil-label {
  margin-top: 8px; padding: 3px 10px;
  background: #14141c; border: 1px solid var(--steel); border-radius: 3px;
  font-family: 'JetBrains Mono', monospace; font-size: 8px;
  letter-spacing: 0.1em; color: var(--steel-gray);
  opacity: 0; animation: fadeIn 0.5s ease-out 7.0s forwards;
}

/* ── Particle float ────────────────────── */
@keyframes pF1 {
  0%   { transform: translate(0,0); opacity: 0; }
  12%  { opacity: 0.75; }
  88%  { opacity: 0.2; }
  100% { transform: translate(10px,-34px); opacity: 0; }
}
@keyframes pF2 {
  0%   { transform: translate(0,0); opacity: 0; }
  18%  { opacity: 0.6; }
  82%  { opacity: 0.15; }
  100% { transform: translate(-12px,-30px); opacity: 0; }
}
@keyframes pF3 {
  0%   { transform: translate(0,0); opacity: 0; }
  10%  { opacity: 0.55; }
  90%  { opacity: 0.12; }
  100% { transform: translate(6px,-38px); opacity: 0; }
}

/* ── Replay ────────────────────────────── */
.replay-btn {
  position: fixed; bottom: 16px; right: 16px;
  background: #1f2937; border: 1px solid #2a2a35;
  color: #6b7280; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 0.1em;
  padding: 7px 12px; cursor: pointer; z-index: 10;
  transition: color 0.2s, border-color 0.2s;
}
.replay-btn:hover { color: #fafafa; border-color: #e85d04; }

@media (max-width: 780px) { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<svg class="bg-layer" id="bgLayer" xmlns="http://www.w3.org/2000/svg"></svg>

<div class="page-header">
  <h1>LYRA FORGE</h1>
  <div class="sub">v0.2.2 — particle aura / 3 industrial × 3 hexagonal</div>
</div>

<div class="grid" id="grid"></div>
<button class="replay-btn" id="replayBtn">replay</button>

<script>
// ═══════════════════════════════════════════════════════════════════════
const C = {
  obsidian: '#0a0a0f', forge: '#e85d04', ember: '#f97316',
  steel: '#2a2a35', steelGray: '#6b7280', spark: '#fafafa',
  iron: '#1f2937',
};

const VARS = [
  { key: 'A', label: 'Industrial — Standard',  fn: anvilIndustrialStd },
  { key: 'B', label: 'Industrial — Circuit',   fn: anvilIndustrialCircuit },
  { key: 'C', label: 'Industrial — Armored',   fn: anvilIndustrialArmored },
  { key: 'D', label: 'Hexagonal — Standard',   fn: anvilHexStd },
  { key: 'E', label: 'Hexagonal — Crystal',    fn: anvilHexCrystal },
  { key: 'F', label: 'Hexagonal — Monument',   fn: anvilHexMonument },
];

// ═══════════════════════════════════════════════════════════════════════
// BACKGROUND SPARKS
// ═══════════════════════════════════════════════════════════════════════
(function() {
  const svg = document.getElementById('bgLayer');
  const ns = 'http://www.w3.org/2000/svg';
  const w = window.innerWidth, h = window.innerHeight;
  const cols = [C.forge, C.ember, C.spark, C.forge, C.spark];
  for (let i = 0; i < 30; i++) {
    const x = Math.random()*w, y = h*0.3+Math.random()*h*0.7;
    const r = 0.4+Math.random()*1, op = 0.03+Math.random()*0.09;
    const dur = 18+Math.random()*20, delay = Math.random()*dur;
    const dx = (Math.random()-0.5)*60, color = cols[i%5];
    const c = document.createElementNS(ns,'circle');
    c.setAttribute('cx',x); c.setAttribute('cy',y);
    c.setAttribute('r',r); c.setAttribute('fill',color);
    const a1 = document.createElementNS(ns,'animate');
    a1.setAttribute('attributeName','cy'); a1.setAttribute('from',y);
    a1.setAttribute('to',-20); a1.setAttribute('dur',dur+'s');
    a1.setAttribute('begin',delay+'s'); a1.setAttribute('repeatCount','indefinite');
    const a2 = document.createElementNS(ns,'animate');
    a2.setAttribute('attributeName','cx');
    a2.setAttribute('values',`${x};${x+dx*0.5};${x+dx}`);
    a2.setAttribute('dur',(dur*0.8)+'s'); a2.setAttribute('begin',delay+'s');
    a2.setAttribute('repeatCount','indefinite');
    const a3 = document.createElementNS(ns,'animate');
    a3.setAttribute('attributeName','opacity');
    a3.setAttribute('values',`0;${op};${op*0.6};${op};0`);
    a3.setAttribute('keyTimes','0;0.1;0.5;0.9;1');
    a3.setAttribute('dur',dur+'s'); a3.setAttribute('begin',delay+'s');
    a3.setAttribute('repeatCount','indefinite');
    c.appendChild(a1); c.appendChild(a2); c.appendChild(a3);
    svg.appendChild(c);
  }
})();

// ═══════════════════════════════════════════════════════════════════════
// SHARED SVG BUILDERS
// ═══════════════════════════════════════════════════════════════════════

function svgDefs(p) {
  return `
    <linearGradient id="${p}-dF" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#2a1808"/><stop offset="40%" stop-color="#1a0f06"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </linearGradient>
    <linearGradient id="${p}-tF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="${C.spark}" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="${C.forge}" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="${p}-lF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="${C.forge}" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="${C.obsidian}" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="${p}-rF" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${C.ember}" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="${C.obsidian}" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="${p}-cG" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="${C.ember}" stop-opacity="0.75"/>
      <stop offset="40%" stop-color="${C.forge}" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="${C.forge}" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="${p}-hR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="${C.spark}"/>
      <stop offset="35%" stop-color="${C.ember}"/>
      <stop offset="100%" stop-color="${C.forge}" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="${p}-sG" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="${C.forge}" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="${C.spark}" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="${p}-aF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${C.steel}"/><stop offset="100%" stop-color="${C.iron}"/>
    </linearGradient>
    <filter id="${p}-gS" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="${p}-aS" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="${C.forge}" flood-opacity="0.15"/>
    </filter>
    <clipPath id="${p}-dC">
      <polygon points="120,14 182,82 156,142 120,158 84,142 58,82"/>
    </clipPath>
  `;
}

// ── Phase 1: Converging Sparks ──────────────────────────────────────
function convergeSparks() {
  const S = [
    { r:2.2, f:C.ember, op:'0;0.9;0', d:0.9, b:0.3, path:'M 30,20 C 70,50 100,80 120,100' },
    { r:2.0, f:C.forge, op:'0;0.8;0', d:0.9, b:0.45, path:'M 210,25 C 175,55 148,78 122,100' },
    { r:1.8, f:C.spark, op:'0;0.7;0', d:0.8, b:0.5, path:'M 10,90 C 50,90 85,92 118,98' },
    { r:1.8, f:C.spark, op:'0;0.7;0', d:0.8, b:0.55, path:'M 230,90 C 190,90 155,92 122,98' },
    { r:1.6, f:C.forge, op:'0;0.6;0', d:0.75, b:0.6, path:'M 40,160 C 75,145 100,120 118,102' },
    { r:1.6, f:C.ember, op:'0;0.6;0', d:0.75, b:0.65, path:'M 200,160 C 165,145 140,120 122,102' },
    { r:1.2, f:C.forge, op:'0;0.5;0', d:0.6, b:0.4, path:'M 120,0 C 120,30 120,65 120,98' },
    { r:1.2, f:C.spark, op:'0;0.4;0', d:0.7, b:0.7, path:'M 55,45 C 80,65 100,82 118,100' },
    { r:1.2, f:C.spark, op:'0;0.4;0', d:0.7, b:0.75, path:'M 185,45 C 160,65 140,82 122,100' },
  ];
  return S.map(s=>`
    <circle r="${s.r}" fill="${s.f}" opacity="0">
      <animate attributeName="opacity" values="${s.op}" dur="${s.d}s" begin="${s.b}s" fill="freeze"/>
      <animateMotion path="${s.path}" dur="${s.d}s" begin="${s.b}s" fill="freeze"/>
    </circle>`).join('');
}

// ── Phases 2–4: Diamond + core glow + CONSTELLATION flash ───────────
function diamondPhases(p) {
  return `
    <!-- Base fill -->
    <polygon points="120,14 182,82 156,142 120,158 84,142 58,82"
      fill="url(#${p}-dF)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.25s" begin="1.4s" fill="freeze"/>
    </polygon>

    <!-- Facets -->
    <polygon points="120,14 58,82 182,82"
      fill="url(#${p}-tF)" stroke="${C.spark}" stroke-width="0.8" stroke-opacity="0.35" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.5s" fill="freeze"/>
    </polygon>
    <polygon points="120,14 58,82 84,142 120,100"
      fill="url(#${p}-lF)" stroke="${C.forge}" stroke-width="0.7" stroke-opacity="0.5" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.7s" fill="freeze"/>
    </polygon>
    <polygon points="120,14 182,82 156,142 120,100"
      fill="url(#${p}-rF)" stroke="${C.ember}" stroke-width="0.7" stroke-opacity="0.4" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.85s" fill="freeze"/>
    </polygon>
    <polygon points="58,82 84,142 120,158 120,100"
      fill="#1a0e06" fill-opacity="0.7" stroke="${C.forge}" stroke-width="0.7" stroke-opacity="0.3" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.0s" fill="freeze"/>
    </polygon>
    <polygon points="182,82 156,142 120,158 120,100"
      fill="#12100a" fill-opacity="0.65" stroke="${C.ember}" stroke-width="0.7" stroke-opacity="0.25" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.1s" fill="freeze"/>
    </polygon>

    <!-- Edge traces -->
    <line x1="120" y1="14" x2="58" y2="82" stroke="${C.forge}" stroke-width="1.5" stroke-linecap="round"
      stroke-dasharray="80" stroke-dashoffset="80" opacity="0">
      <animate attributeName="stroke-dashoffset" from="80" to="0" dur="0.4s" begin="1.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="opacity" from="0" to="0.9" dur="0.15s" begin="1.5s" fill="freeze"/>
    </line>
    <line x1="120" y1="14" x2="182" y2="82" stroke="${C.ember}" stroke-width="1.5" stroke-linecap="round"
      stroke-dasharray="80" stroke-dashoffset="80" opacity="0">
      <animate attributeName="stroke-dashoffset" from="80" to="0" dur="0.4s" begin="1.65s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="opacity" from="0" to="0.85" dur="0.15s" begin="1.65s" fill="freeze"/>
    </line>
    <line x1="58" y1="82" x2="84" y2="142" stroke="${C.forge}" stroke-width="1.2" stroke-linecap="round"
      stroke-dasharray="65" stroke-dashoffset="65" opacity="0">
      <animate attributeName="stroke-dashoffset" from="65" to="0" dur="0.35s" begin="1.8s" fill="freeze"/>
      <animate attributeName="opacity" from="0" to="0.7" dur="0.15s" begin="1.8s" fill="freeze"/>
    </line>
    <line x1="182" y1="82" x2="156" y2="142" stroke="${C.ember}" stroke-width="1.2" stroke-linecap="round"
      stroke-dasharray="65" stroke-dashoffset="65" opacity="0">
      <animate attributeName="stroke-dashoffset" from="65" to="0" dur="0.35s" begin="1.9s" fill="freeze"/>
      <animate attributeName="opacity" from="0" to="0.65" dur="0.15s" begin="1.9s" fill="freeze"/>
    </line>
    <line x1="84" y1="142" x2="120" y2="158" stroke="${C.forge}" stroke-width="1.2" stroke-linecap="round"
      stroke-dasharray="42" stroke-dashoffset="42" opacity="0">
      <animate attributeName="stroke-dashoffset" from="42" to="0" dur="0.3s" begin="2.05s" fill="freeze"/>
      <animate attributeName="opacity" from="0" to="0.6" dur="0.15s" begin="2.05s" fill="freeze"/>
    </line>
    <line x1="156" y1="142" x2="120" y2="158" stroke="${C.ember}" stroke-width="1.2" stroke-linecap="round"
      stroke-dasharray="42" stroke-dashoffset="42" opacity="0">
      <animate attributeName="stroke-dashoffset" from="42" to="0" dur="0.3s" begin="2.15s" fill="freeze"/>
      <animate attributeName="opacity" from="0" to="0.55" dur="0.15s" begin="2.15s" fill="freeze"/>
    </line>
    <!-- Belt + axis -->
    <line x1="58" y1="82" x2="182" y2="82" stroke="${C.spark}" stroke-width="0.7" stroke-opacity="0.2"
      stroke-dasharray="124" stroke-dashoffset="124" opacity="0">
      <animate attributeName="stroke-dashoffset" from="124" to="0" dur="0.45s" begin="1.75s" fill="freeze"/>
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="1.75s" fill="freeze"/>
    </line>
    <line x1="120" y1="14" x2="120" y2="158" stroke="${C.forge}" stroke-width="0.6" stroke-opacity="0.25"
      stroke-dasharray="144" stroke-dashoffset="144" opacity="0">
      <animate attributeName="stroke-dashoffset" from="144" to="0" dur="0.5s" begin="1.6s" fill="freeze"/>
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="1.6s" fill="freeze"/>
    </line>

    <!-- Core glow (NO ELLIPSE — using circle) -->
    <circle cx="120" cy="95" r="0" fill="url(#${p}-cG)" opacity="0" clip-path="url(#${p}-dC)">
      <animate attributeName="r" from="0" to="51" dur="0.6s" begin="2.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="2.2s" fill="freeze"/>
    </circle>

    <!-- ════════════════════════════════════════════════════════
         CONSTELLATION FLASH (Phase 4) — 2.85s, dur 2.0s
         Longer hold, higher opacity, circuit traces + connectors
         ════════════════════════════════════════════════════════ -->
    <g opacity="0">
      <animate attributeName="opacity"
        values="0;0;0.72;0.65;0.5;0.2;0"
        keyTimes="0;0.03;0.12;0.4;0.6;0.85;1"
        dur="2.0s" begin="2.85s" fill="freeze"/>

      <!-- Hub center -->
      <circle cx="120" cy="95" r="5" fill="url(#${p}-hR)" filter="url(#${p}-gS)"/>

      <!-- Spokes to vertices (thicker) -->
      <line x1="120" y1="95" x2="120" y2="28"  stroke="url(#${p}-sG)" stroke-width="1.0" stroke-linecap="round"/>
      <line x1="120" y1="95" x2="73"  y2="82"  stroke="url(#${p}-sG)" stroke-width="1.0" stroke-linecap="round"/>
      <line x1="120" y1="95" x2="167" y2="82"  stroke="url(#${p}-sG)" stroke-width="1.0" stroke-linecap="round"/>
      <line x1="120" y1="95" x2="88"  y2="140" stroke="url(#${p}-sG)" stroke-width="1.0" stroke-linecap="round"/>
      <line x1="120" y1="95" x2="152" y2="140" stroke="url(#${p}-sG)" stroke-width="1.0" stroke-linecap="round"/>
      <line x1="120" y1="95" x2="120" y2="155" stroke="url(#${p}-sG)" stroke-width="1.0" stroke-linecap="round"/>

      <!-- Circuit node dots (larger) -->
      <circle cx="120" cy="57"  r="2.8" fill="${C.forge}" opacity="0.85"/>
      <circle cx="96"  cy="89"  r="2.2" fill="${C.spark}" opacity="0.8"/>
      <circle cx="144" cy="89"  r="2.2" fill="${C.spark}" opacity="0.8"/>
      <circle cx="104" cy="117" r="2.2" fill="${C.forge}" opacity="0.7"/>
      <circle cx="136" cy="117" r="2.2" fill="${C.forge}" opacity="0.7"/>
      <circle cx="120" cy="128" r="2.5" fill="${C.ember}" opacity="0.8"/>

      <!-- Dashed circuit traces (from v1) -->
      <line x1="88" y1="67" x2="108" y2="67"
        stroke="${C.forge}" stroke-width="0.7" stroke-opacity="0.6" stroke-dasharray="3 3"/>
      <line x1="132" y1="67" x2="152" y2="67"
        stroke="${C.spark}" stroke-width="0.7" stroke-opacity="0.45" stroke-dasharray="3 3"/>

      <!-- Polyline angle connectors (from v1) -->
      <polyline points="104,72 110,67 116,72"
        stroke="${C.forge}" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.6"/>
      <polyline points="124,72 130,67 136,72"
        stroke="${C.spark}" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.45"/>

      <!-- Extra trace details for richer constellation -->
      <line x1="96" y1="110" x2="104" y2="117"
        stroke="${C.forge}" stroke-width="0.6" stroke-opacity="0.4" stroke-dasharray="2 2"/>
      <line x1="136" y1="117" x2="144" y2="110"
        stroke="${C.spark}" stroke-width="0.6" stroke-opacity="0.35" stroke-dasharray="2 2"/>
      <polyline points="108,120 120,128 132,120"
        stroke="${C.ember}" stroke-width="0.6" stroke-linecap="round" fill="none" opacity="0.4"/>
    </g>

// ── Particle Field Aura ─────────────────────────────────────────────
function particleAura() {
  const cx=120, cy=88, count=20;
  let out='';
  for (let i=0; i<count; i++) {
    const angle = (i/count)*Math.PI*2 + Math.sin(i*7)*0.3;
    const dist = 52 + Math.sin(i*3.7)*22;
    const x = cx + Math.cos(angle)*dist;
    const y = cy + Math.sin(angle)*dist*0.82;
    const r = 0.7 + (i%4)*0.35;
    const color = [C.forge, C.ember, C.spark][i%3];
    const dur = 4.5 + (i%5)*1.2;
    const delay = (i*0.5)%dur;
    out += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r}" fill="${color}"
      opacity="0" style="animation: pF${1+(i%3)} ${dur.toFixed(1)}s ease-in-out ${delay.toFixed(1)}s infinite;"/>`;
  }
  return `
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="6.0s" fill="freeze"/>
      ${out}
    </g>`;
}

// BUILD GRID
// ═══════════════════════════════════════════════════════════════════════
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  VARS.forEach(v => {
    const p = v.key;
    const cell = document.createElement('div');
    cell.className = 'cell';

    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('class', 'mark');
    svg.setAttribute('viewBox', '0 0 240 240');
    svg.setAttribute('xmlns', ns);
    svg.setAttribute('overflow', 'visible');

    svg.innerHTML = `
      <defs>${svgDefs(p)}</defs>
      <g>${convergeSparks()}</g>
      <g style="transform-origin: 120px 100px;">
        ${diamondPhases(p)}
      </g>
      ${v.fn(p)}
      ${idleEffects(p)}
      ${particleAura()}
    `;

    cell.appendChild(svg);

    const wm = document.createElement('div');
    wm.className = 'wordmark idle';
    wm.textContent = 'LYRA';
    cell.appendChild(wm);

    const tl = document.createElement('div');
    tl.className = 'tagline';
    tl.textContent = 'your intelligence, compounded';
    cell.appendChild(tl);

    const lb = document.createElement('div');
    lb.className = 'anvil-label';
    lb.textContent = v.key + ' — ' + v.label;
    cell.appendChild(lb);

    grid.appendChild(cell);
  });
}

buildGrid();

// ── Replay ──────────────────────────────────────────────────────────
document.getElementById('replayBtn').addEventListener('click', buildGrid);
