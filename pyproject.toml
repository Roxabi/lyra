[project]
name = "lyra"
version = "0.1.0"
description = "Lyra by Roxabi — Personal AI agent engine"
requires-python = ">=3.12"
dependencies = [
    "roxabi-memory",
    "pydantic>=2.12.5",
    # Adapters
    "aiogram>=3.26",       # Telegram — asyncio-native, tracks Bot API same-day
    "discord.py>=2.4",     # Discord — gateway WebSocket, on_message events
    # HTTP (webhook server for Telegram + inter-machine calls)
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "httpx[asyncio]>=0.28",
    "python-dotenv>=1.0",
    # Agent backends
    "anthropic>=0.49",
]

[project.optional-dependencies]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
roxabi-memory = { git = "https://github.com/Roxabi/roxabi-memory.git", branch = "staging" }

[tool.hatch.build.targets.wheel]
packages = ["src/lyra"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.pyright]
pythonVersion = "3.12"
include = ["src", "tests"]
venvPath = "."
venv = ".venv"

[tool.ruff]
exclude = [".claude/worktrees"]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.format]

[dependency-groups]
dev = [
    "pip-licenses>=5.5.1",
    "pre-commit>=4.5.1",
    "pyright>=1.1",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.3",
]
