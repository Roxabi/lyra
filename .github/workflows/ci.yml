name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install system dependencies
        run: sudo apt-get install -y portaudio19-dev

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v7

      - name: Install dependencies
        run: uv sync --frozen --all-extras --group dev

      - name: Check file length
        run: bash tools/check_file_length.sh

      - name: Enforce import layers
        run: uv run lint-imports

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run pyright

      - name: Test with coverage
        run: uv run pytest

      - name: Test dep-graph sub-project
        working-directory: scripts/dep-graph
        run: |
          uv sync --frozen
          uv run pytest tests/

  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6 # v3.94.3
        with:
          extra_args: --only-verified
