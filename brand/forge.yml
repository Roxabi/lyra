# forge.yml — Lyra brand book for forge skills
#
# Structured project-level configuration that forge skills read as a decision
# substrate. When this file is present, forge skips Frame/aesthetic judgment
# and applies these values verbatim — only running phases the brand book
# explicitly leaves open.
#
# Source of truth: ~/projects/lyra/brand/BRAND-BOOK.md (v2.1, 2026-03-24)
# Schema spec:     ~/projects/roxabi-plugins/plugins/forge/references/brand-book-schema.md
#
# Discovery path: ~/projects/lyra/brand/forge.yml (preferred, versioned).

schema_version: 1

# ── Aesthetic ──────────────────────────────────────────────────
# Direction H — Forge (chosen in BRAND-BOOK v2).
# Theme: maker energy, raw materials in / crafted output out.
aesthetic: lyra.css

# ── Palette (BRAND-BOOK § 6 Visual Identity) ───────────────────
# Dark is primary. Light is authorized for documentation only
# (marketing / landing surfaces remain dark-only — § 6 Light Mode).
palette:
  dark:
    bg:         '#0a0a0f'   # Obsidian — near-absolute dark, page background
    surface:    '#18181f'   # Forge Floor — elevated panels, cards
    border:     '#2a2a35'   # Steel — borders, dividers
    text:       '#fafafa'   # Spark White — BODY TEXT (per BRAND-BOOK § 6), wordmark, node centres
    text-muted: '#9ca3af'   # intermediate emphasis only — subtitles, label rows. NOT body copy.
    text-dim:   '#6b7280'   # Steel Gray — metadata, secondary labels (per BRAND-BOOK § 6)
    accent:     '#e85d04'   # Forge Orange — brand signal (one per composition)
    accent-dim: '#7c2d0e'   # Ember damped — hover/pressed states
  light:
    bg:         '#fafaf9'   # warm stone
    surface:    '#f4f4f0'
    border:     '#d1ccc7'
    text:       '#1c1917'   # near-black
    text-muted: '#57534e'   # warm gray
    text-dim:   '#78716c'
    accent:     '#c2410c'   # Forge Orange darkened for contrast on light surfaces
    accent-dim: '#fef2e8'

# ── Typography (BRAND-BOOK § 6 Visual Identity) ────────────────
# Four fonts, strict role assignment. See deliver_must_match for usage limits.
typography:
  display:  'Chakra Petch'    # hero headlines only — angular, industrial, forge energy
  sans:     'Outfit'          # 800 weight — section titles, wordmark, nav
  body:     'Inter'           # 400/500 — all prose, captions, UI labels
  mono:     'JetBrains Mono'  # CLI commands, config values, file paths, FORGE submark

# ── Component defaults ─────────────────────────────────────────
# Pre-fill Style phase decisions. Matches existing canonical outputs
# in ~/.roxabi/forge/lyra/visuals/.
components:
  hero:              left-border    # understated, technical — not elevated/top-border
  section_label:     dot            # matches nats-roadmap, user-guide-v17, architecture-v3
  card_default:      accent         # .card.accent — Forge Orange border-left
  timeline:          steps          # .steps + .step + .step-num for sequential walks
  badges:            verdict        # .verdict-badge.green/amber/cyan/red for built/active/planned
  mermaid_theme_bias: dark          # dark-first; light is docs-only

# ── Structure preferences ──────────────────────────────────────
# Bias Structure decisions. Does not override content topology —
# resolves ties between equally valid choices.
structure_defaults:
  prefer_fgraph_under: 6     # hub-and-spoke ≤ 6 peers → fgraph (see nats-roadmap process map)
  prefer_mermaid_over: 8     # > 8 nodes → mermaid regardless of topology
  comparison_as_table: true  # matrices use HTML tables, not grid cards

# ── Canonical examples ─────────────────────────────────────────
# Reference outputs the Deliver phase spot-checks generated visuals against.
# All files verified present on disk at time of writing.
examples:
  - ~/.roxabi/forge/lyra/visuals/tabs/nats-roadmap/tab-current.html
  - ~/.roxabi/forge/lyra/visuals/lyra-user-guide-v17.html
  - ~/.roxabi/forge/lyra/visuals/lyra-architecture-v3.html
  - ~/.roxabi/forge/lyra/visuals/nats-arch-roadmap.html
  - ~/.roxabi/forge/lyra/visuals/lyra-doc-audit.html

# ── Deliver constraints ────────────────────────────────────────
# Hard verification rules. Deliver phase checks every generated output
# against these and reports violations before writing the file.
# Derived from BRAND-BOOK §§ 4 (voice/vocabulary) and 6 (visual identity).
deliver_must_match:
  - 'accent color is Forge Orange (#e85d04 dark / #c2410c light)'
  - 'hero uses .hero.left-border variant'
  - 'section labels use .section-label.dot prefix'
  - 'body copy color is var(--text) — Spark White #fafafa per BRAND-BOOK § 6; never var(--text-muted) or var(--text-dim) which are dim and fail readability on Obsidian'
  - 'Mermaid diagrams wrapped in .diagram-shell with zoom controls'
  - 'no emoji in section headers'
  - 'no ASCII art in <pre class="arch"> blocks'
  - 'Chakra Petch reserved for hero-level headlines only (not body, not section titles)'
  - 'JetBrains Mono reserved for CLI commands, config values, file paths'
  - 'copy must not contain: AI-powered, next-generation, cutting-edge, seamless, intelligent assistant, game-changer, revolutionize, leverage, ecosystem, democratize, solution, on-premise, consumer, chatbot'
  - 'avoid passive voice for key claims (brand book § 4 writing rules)'

# ── Override policy ────────────────────────────────────────────
# Lyra's brand book is mature and authoritative. Most decisions are locked.
#   locked    — plugin may never deviate
#   partial   — brand default, content may override if it strongly demands
#   open      — content topology decides (brand is tiebreak)
#   advisory  — informational only, no enforcement
allow_override:
  aesthetic:  locked     # Forge direction H is v2 authoritative — never deviate
  palette:    locked     # 8 core tokens, no additions without updating BRAND-BOOK
  typography: locked     # four fonts, no exceptions
  components: partial    # hero/label/card default from brand; content may flex for audits
  structure:  open       # content topology decides; brand is tiebreak only
  examples:   advisory   # examples guide; don't hard-fail on legitimate divergence

# ── Project metadata ───────────────────────────────────────────
project:
  name:       'Lyra'
  full_name:  'Lyra by Roxabi'
  tagline:    'Your intelligence, compounded.'
  category:   'Personal Intelligence Engine'
  brand_book: '~/projects/lyra/brand/BRAND-BOOK.md'
