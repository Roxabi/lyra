<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lyra — Avatar Final</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .wordmark {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #e85d04;
      margin-bottom: 48px;
      opacity: 0.9;
    }

    .avatar-wrap {
      position: relative;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(232, 93, 4, 0.15),
        0 0 40px rgba(232, 93, 4, 0.12),
        0 0 80px rgba(232, 93, 4, 0.06),
        0 32px 80px rgba(0,0,0,0.7);
      animation: breathe 4s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 0 1px rgba(232,93,4,0.15), 0 0 40px rgba(232,93,4,0.12), 0 0 80px rgba(232,93,4,0.06), 0 32px 80px rgba(0,0,0,0.7); }
      50% { box-shadow: 0 0 0 1px rgba(232,93,4,0.3), 0 0 60px rgba(232,93,4,0.2), 0 0 120px rgba(232,93,4,0.1), 0 32px 80px rgba(0,0,0,0.7); }
    }

    .avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .name {
      margin-top: 36px;
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: #f0f0f0;
    }

    .tagline {
      margin-top: 10px;
      font-size: 14px;
      color: rgba(240,240,240,0.4);
      letter-spacing: 0.08em;
    }

    .badge {
      margin-top: 28px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border: 1px solid rgba(232,93,4,0.3);
      border-radius: 100px;
      font-size: 12px;
      color: #e85d04;
      letter-spacing: 0.1em;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #e85d04;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .meta {
      margin-top: 48px;
      font-size: 11px;
      color: rgba(240,240,240,0.2);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <div class="wordmark">Roxabi · Lyra</div>

  <div class="avatar-wrap">
    <img src="concepts/avatar-final/006-just-solved-1024.png" alt="Lyra avatar" />
  </div>

  <div class="name">Lyra</div>
  <div class="tagline">Your personal AI, always within reach.</div>

  <div class="badge">Avatar · Final · 1024px</div>

  <div class="meta">flux2-klein · 28 steps · forge orange rim · obsidian bg</div>

</body>
</html>
