<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyra — Girls + 3D Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0e0e0; font-family: 'Inter', sans-serif; padding: 48px 24px 64px; min-height: 100vh; }
header { text-align: center; margin-bottom: 12px; }
header h1 { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 32px; color: #fafafa; margin-bottom: 6px; letter-spacing: 0.06em; }
header .brand-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #e85d04; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
header .meta { font-size: 12px; color: #6b7280; font-family: 'JetBrains Mono', monospace; }
.direction-tag { display: inline-block; margin: 18px auto 36px; padding: 6px 16px; border: 1px solid #2a2a35; border-radius: 20px; font-size: 11px; font-family: 'JetBrains Mono', monospace; color: #6b7280; background: #18181f; }
.direction-tag span { color: #e85d04; }
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 1600px; margin: 0 auto; }
@media (max-width: 1200px) { .grid { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 900px)  { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 600px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
.card { background: #18181f; border: 1px solid #2a2a35; border-radius: 12px; overflow: hidden; cursor: pointer; position: relative; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s; }
.card:hover { border-color: #e85d04; transform: translateY(-4px); box-shadow: 0 8px 32px rgba(232,93,4,0.18); }
.badge { position: absolute; top: 8px; left: 10px; z-index: 2; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #fafafa; background: rgba(10,10,15,0.85); padding: 2px 7px; border-radius: 4px; border: 1px solid #2a2a35; }
.card img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; display: block; background: #0a0a0f; }
.info { padding: 12px 14px 14px; }
.info .label { font-size: 12px; font-weight: 600; color: #fafafa; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.info .style-desc { font-size: 10px; color: #6b7280; font-family: 'JetBrains Mono', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
.lightbox.open { display: flex; }
.lb-img { max-width: 80vw; max-height: 78vh; border-radius: 10px; object-fit: contain; display: block; border: 1px solid #2a2a35; }
.lb-caption { margin-top: 18px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #6b7280; text-align: center; }
.lb-btn { position: absolute; top: 50%; transform: translateY(-50%); font-size: 40px; color: #2a2a35; cursor: pointer; padding: 16px 24px; user-select: none; line-height: 1; transition: color 0.15s; }
.lb-btn:hover { color: #e85d04; }
.lb-prev { left: 12px; } .lb-next { right: 12px; }
.lb-close { position: absolute; top: 18px; right: 22px; font-size: 22px; color: #6b7280; cursor: pointer; transition: color 0.15s; }
.lb-close:hover { color: #fafafa; }
footer { text-align: center; margin-top: 56px; font-size: 11px; color: #2a2a35; font-family: 'JetBrains Mono', monospace; }
footer span { color: #e85d04; }
</style>
</head>
<body>
<header>
  <div class="brand-sub">Lyra by Roxabi</div>
  <h1>Girls + 3D CGI</h1>
  <p class="meta" id="proj-subtitle"></p>
</header>
<div style="text-align:center">
  <span class="direction-tag">Inspired by <span>#263</span> + <span>#269</span> · Pixar · anime 3D · game char · Genshin · cozy/isometric · forge palette</span>
</div>
<div class="grid" id="gallery"></div>
<div class="lightbox" id="lightbox">
  <span class="lb-close" id="lb-close">✕</span>
  <span class="lb-btn lb-prev" id="lb-prev">&#x2039;</span>
  <span class="lb-btn lb-next" id="lb-next">&#x203a;</span>
  <img class="lb-img" id="lb-img" src="" alt="">
  <div class="lb-caption" id="lb-caption"></div>
</div>
<footer>Generated with <span>Flux</span> · Lyra brand exploration · 2026-03-25</footer>
<script>
const IMAGES = [
  { num: 279, src: "concepts/279-3d-chibi-girl-forge-night.png",           label: "Chibi Girl — Forge Night",       style: "Pixar 3D · apron + hammer · cozy nighttime glow" },
  { num: 280, src: "concepts/280-3d-anime-girl-sleeping-anvil.png",        label: "Anime Girl — Sleeping on Anvil", style: "3D sleeping · zzz · diamond glow · Ghibli warmth" },
  { num: 281, src: "concepts/281-3d-isometric-girl-workshop.png",          label: "Iso Girl — Workshop",            style: "3D isometric · nighttime diorama · game asset" },
  { num: 282, src: "concepts/282-3d-anime-girl-holding-diamond.png",       label: "Anime Girl — Holding Diamond",   style: "3D · both hands · face lit by amber gem · wonder" },
  { num: 283, src: "concepts/283-3d-chibi-girl-portrait-smith.png",        label: "Chibi Girl — Smith Portrait",    style: "bust · apron · goggles · confident · Pixar 3D" },
  { num: 284, src: "concepts/284-3d-anime-girl-night-forge-glow.png",      label: "Anime Girl — Night Rest",        style: "sitting on anvil · diamond in palm · Ghibli mood" },
  { num: 285, src: "concepts/285-3d-pixar-girl-crafting.png",              label: "Pixar Girl — Crafting",          style: "Pixar cinematic 3D · tongs · workbench · focused" },
  { num: 286, src: "concepts/286-3d-kawaii-girl-sticker-figure.png",       label: "Kawaii Girl — Vinyl Figure",     style: "3D sticker figure · rounded form · collectible" },
  { num: 287, src: "concepts/287-3d-anime-girl-amber-eyes-close.png",      label: "Anime Girl — Amber Eyes",        style: "3D close-up · amber iris · diamond reflection" },
  { num: 288, src: "concepts/288-3d-game-char-girl-smith.png",             label: "Game Char — Girl Smith",         style: "Genshin-style 3D · dynamic pose · game splash art" },
  { num: 289, src: "concepts/289-3d-chibi-girl-victory-diamond.png",       label: "Chibi Girl — Victory",           style: "arms raised · diamond held high · spark confetti" },
  { num: 290, src: "concepts/290-3d-girl-sitting-giant-diamond.png",       label: "Anime Girl — Giant Diamond",     style: "girl on huge diamond · scale contrast · dreamy" },
  { num: 291, src: "concepts/291-3d-girl-surrounded-sparks.png",           label: "Anime Girl — Spark Swirl",       style: "forge sparks orbiting · reaching out · magical" },
  { num: 292, src: "concepts/292-3d-isometric-cozy-girl-room.png",         label: "Iso Girl — Cozy Room Night",     style: "3D diorama · sleeping · diamond bedside · cozy" },
  { num: 293, src: "concepts/293-3d-anime-girl-forge-portrait-dramatic.png",label:"Anime Girl — Dramatic Portrait", style: "3D chiaroscuro · half-face shadow · intense amber eyes" },
];
(function () {
  const gallery = document.getElementById('gallery');
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbCap = document.getElementById('lb-caption');
  document.getElementById('proj-subtitle').textContent = IMAGES.length + ' AI-generated concepts — 3D CGI girls · forge palette · click to enlarge';
  let current = 0;
  IMAGES.forEach((item, i) => {
    const num = String(item.num).padStart(3, '0');
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<span class="badge">#' + num + '</span><img src="' + item.src + '" alt="' + item.label + '" loading="lazy"><div class="info"><div class="label">' + item.label + '</div><div class="style-desc">' + item.style + '</div></div>';
    card.addEventListener('click', () => open(i));
    gallery.appendChild(card);
  });
  function open(i) { current = i; const item = IMAGES[i]; lbImg.src = item.src; lbImg.alt = item.label; lbCap.textContent = '#' + String(item.num).padStart(3,'0') + ' ' + item.label + ' — ' + item.style; lightbox.classList.add('open'); }
  function close() { lightbox.classList.remove('open'); }
  function nav(dir) { open((current + dir + IMAGES.length) % IMAGES.length); }
  document.getElementById('lb-close').addEventListener('click', close);
  document.getElementById('lb-prev').addEventListener('click', (e) => { e.stopPropagation(); nav(-1); });
  document.getElementById('lb-next').addEventListener('click', (e) => { e.stopPropagation(); nav(1); });
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) close(); });
  document.addEventListener('keydown', (e) => { if (!lightbox.classList.contains('open')) return; if (e.key === 'Escape') close(); if (e.key === 'ArrowLeft') nav(-1); if (e.key === 'ArrowRight') nav(1); });
}());
</script>
</body>
</html>
