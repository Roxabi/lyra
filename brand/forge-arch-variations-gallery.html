<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyra — Architecture Variations Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0e0e0; font-family: 'Inter', sans-serif; padding: 48px 24px 64px; min-height: 100vh; }
header { text-align: center; margin-bottom: 36px; }
header h1 { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 32px; color: #fafafa; margin-bottom: 6px; letter-spacing: 0.06em; }
header .brand-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #e85d04; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
header .meta { font-size: 12px; color: #6b7280; font-family: 'JetBrains Mono', monospace; }
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; max-width: 1400px; margin: 0 auto; }
@media (max-width: 1100px) { .grid { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 800px)  { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 500px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
.card { background: #18181f; border: 1px solid #2a2a35; border-radius: 10px; overflow: hidden; cursor: pointer; position: relative; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s; }
.card:hover { border-color: #e85d04; transform: translateY(-3px); box-shadow: 0 6px 28px rgba(232,93,4,0.18); }
.badge { position: absolute; top: 7px; left: 9px; z-index: 2; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #fafafa; background: rgba(10,10,15,0.85); padding: 2px 6px; border-radius: 3px; border: 1px solid #2a2a35; }
.card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; background: #0a0a0f; }
.info { padding: 10px 12px 12px; }
.info .label { font-size: 11px; font-weight: 600; color: #fafafa; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.info .style-desc { font-size: 9px; color: #6b7280; font-family: 'JetBrains Mono', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
.lightbox.open { display: flex; }
.lb-img { max-width: 90vw; max-height: 85vh; border-radius: 8px; object-fit: contain; display: block; border: 1px solid #2a2a35; }
.lb-caption { margin-top: 14px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #6b7280; text-align: center; }
.lb-btn { position: absolute; top: 50%; transform: translateY(-50%); font-size: 36px; color: #2a2a35; cursor: pointer; padding: 14px 20px; user-select: none; line-height: 1; transition: color 0.15s; }
.lb-btn:hover { color: #e85d04; }
.lb-prev { left: 8px; } .lb-next { right: 8px; }
.lb-close { position: absolute; top: 16px; right: 20px; font-size: 20px; color: #6b7280; cursor: pointer; transition: color 0.15s; }
.lb-close:hover { color: #fafafa; }
footer { text-align: center; margin-top: 48px; font-size: 11px; color: #2a2a35; font-family: 'JetBrains Mono', monospace; }
footer span { color: #e85d04; }
</style>
</head>
<body>
<header>
  <div class="brand-sub">Lyra by Roxabi</div>
  <h1>Architecture Diagram Variations</h1>
  <p class="meta">15 concepts · 400×400 · variations on #294–296 · flux2-klein · click to enlarge</p>
</header>
<div class="grid" id="gallery"></div>
<div class="lightbox" id="lightbox">
  <span class="lb-close" id="lb-close">✕</span>
  <span class="lb-btn lb-prev" id="lb-prev">‹</span>
  <span class="lb-btn lb-next" id="lb-next">›</span>
  <img class="lb-img" id="lb-img" src="" alt="">
  <div class="lb-caption" id="lb-caption"></div>
</div>
<footer>Generated with <span>Flux</span> · Lyra brand exploration · 2026-03-25</footer>
<script>
const IMAGES = [
  { num: 297, src: "concepts/297-arch-iso-6spokes.png",          label: "6-Spoke Hub",          style: "full hub-and-spoke · 6 colored satellite tiles" },
  { num: 298, src: "concepts/298-arch-iso-topdown.png",          label: "Top-Down Flat",         style: "aerial view · 2D overhead · flat map" },
  { num: 299, src: "concepts/299-arch-iso-cyberpunk-fog.png",    label: "Cyberpunk Fog",         style: "low ground fog · amber mist · neon night" },
  { num: 300, src: "concepts/300-arch-iso-hologram.png",         label: "Hologram",              style: "translucent amber hologram · scan-lines · sci-fi" },
  { num: 301, src: "concepts/301-arch-iso-blueprint-forge.png",  label: "Blueprint Forge",       style: "engineering drawing · amber lines · dimension marks" },
  { num: 302, src: "concepts/302-arch-iso-data-rain.png",        label: "Data Rain",             style: "matrix-style data streams · orange digital rain" },
  { num: 303, src: "concepts/303-arch-iso-industrial-grit.png",  label: "Industrial Grit",       style: "iron textures · pipe connections · forge workshop" },
  { num: 304, src: "concepts/304-arch-iso-chibi-cute.png",       label: "Chibi Cute",            style: "rounded tiles · kawaii diamond · soft cel-shading" },
  { num: 305, src: "concepts/305-arch-iso-spiderweb.png",        label: "Spider Web",            style: "dense mesh · every node linked · glowing network" },
  { num: 306, src: "concepts/306-arch-iso-exploded-view.png",    label: "Exploded View",         style: "components separated · dotted assembly lines" },
  { num: 307, src: "concepts/307-arch-iso-neon-purple.png",      label: "Neon Orange → Purple",  style: "orange hub → purple satellites · synthwave gradient" },
  { num: 308, src: "concepts/308-arch-iso-comic-bold.png",       label: "Comic Bold",            style: "thick outlines · flat cel · speed lines · halftone" },
  { num: 309, src: "concepts/309-arch-iso-closeup-hub.png",      label: "Close-up Hub",          style: "tight crop · large diamond detail · connections off-frame" },
  { num: 310, src: "concepts/310-arch-iso-pastel-light.png",     label: "Pastel Light Mode",     style: "warm stone bg · docs style · charcoal outlines" },
  { num: 311, src: "concepts/311-arch-iso-night-cityscape.png",  label: "Night Cityscape",       style: "tiny isometric buildings · data cable streets · beacon" },
];
(function () {
  const gallery = document.getElementById('gallery');
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbCap = document.getElementById('lb-caption');
  let current = 0;
  IMAGES.forEach((item, i) => {
    const num = String(item.num).padStart(3,'0');
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<span class="badge">#' + num + '</span><img src="' + item.src + '" alt="' + item.label + '" loading="lazy"><div class="info"><div class="label">' + item.label + '</div><div class="style-desc">' + item.style + '</div></div>';
    card.addEventListener('click', () => open(i));
    gallery.appendChild(card);
  });
  function open(i) { current = i; const item = IMAGES[i]; lbImg.src = item.src; lbImg.alt = item.label; lbCap.textContent = '#' + String(item.num).padStart(3,'0') + ' ' + item.label + ' — ' + item.style; lightbox.classList.add('open'); }
  function close() { lightbox.classList.remove('open'); }
  function nav(dir) { open((current + dir + IMAGES.length) % IMAGES.length); }
  document.getElementById('lb-close').addEventListener('click', close);
  document.getElementById('lb-prev').addEventListener('click', (e) => { e.stopPropagation(); nav(-1); });
  document.getElementById('lb-next').addEventListener('click', (e) => { e.stopPropagation(); nav(1); });
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) close(); });
  document.addEventListener('keydown', (e) => { if (!lightbox.classList.contains('open')) return; if (e.key === 'Escape') close(); if (e.key === 'ArrowLeft') nav(-1); if (e.key === 'ArrowRight') nav(1); });
}());
</script>
</body>
</html>
